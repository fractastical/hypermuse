<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>hyperstition · moon halo</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
    video {
      display: none;
    }
  </style>
</head>
<body>
  <video id="moonVideo" muted playsinline loop preload="auto"></video>
  <div id="vajraVideos" aria-hidden="true"></div>
  <canvas id="stage"></canvas>
  <script>
    const params = new URLSearchParams(location.search);
    const WORD = String(params.get("word") || "hyperstition").toLowerCase();
    const INDEX_URL = "artifacts/moon-cube-index.json";
    const DEFAULT_MOON = "loops/Moon and Astronauts/Moon Loops/approach-and-flight-around-the-moon-2025-12-17-22-46-49-utc.mp4";
    const MOON_SRC = params.get("moon") || DEFAULT_MOON;
    const moonFocusX = clamp01(Number(params.get("focusX") ?? params.get("moonFocusX") ?? "0.5"));
    const moonFocusY = clamp01(Number(params.get("focusY") ?? params.get("moonFocusY") ?? "0.5"));
    const moonFit = String(params.get("moonFit") || "contain").toLowerCase();
    const moonScale = clampNum(Number(params.get("moonScale") ?? "0.9"), 0.25, 1.25);
    const haloSpin = clampNum(Number(params.get("haloSpin") ?? "0.00135"), 0, 0.02);
    const haloStartParam = params.get("haloStart");
    const haloStart = haloStartParam != null && haloStartParam !== "" && Number.isFinite(Number(haloStartParam))
      ? Number(haloStartParam)
      : 0;
    const letterLeadBack = clampNum(Number(params.get("letterLead") ?? String(Math.PI * 0.11)), 0, Math.PI * 0.4);
    const orbitTiltStep = clampNum(Number(params.get("orbitTiltStep") ?? "0.00042"), 0, 0.002);
    const orbitTiltStartParam = params.get("orbitTiltStart");
    const orbitTiltStart = orbitTiltStartParam != null && orbitTiltStartParam !== "" && Number.isFinite(Number(orbitTiltStartParam))
      ? Number(orbitTiltStartParam)
      : (Math.random() * 2 - 1) * 0.35;
    const orbitShape = String(params.get("orbit") || params.get("orbitShape") || "ellipse").toLowerCase();
    const showVajras = params.get("vajras") === "1" || params.get("showVajras") === "1";
    const VAJRA_DIR = "loops/VAJRA DORJE ANIMATIONS";
    const VAJRA_CLIPS = [
      `${VAJRA_DIR}/DORJE 3D ROTATING 1.mp4`,
      `${VAJRA_DIR}/DORJE 3D ROTATING 2.mp4`,
      `${VAJRA_DIR}/DORJE 3D ROTATING 3.mp4`,
      `${VAJRA_DIR}/DORJE 3D ROTATING 4.mp4`,
      `${VAJRA_DIR}/DORJE 3D ROTATING 5.mp4`,
      `${VAJRA_DIR}/Hitem3d-1779724467167.mp4`,
      `${VAJRA_DIR}/Hitem3d-1779724467167_2.mp4`
    ];
    const vajraParam = params.get("vajra");
    const vajraCount = clampNum(Number(params.get("vajraCount") ?? "1"), 1, VAJRA_CLIPS.length);
    const vajraScale = clampNum(Number(params.get("vajraScale") ?? "0.085"), 0.04, 0.22);
    const vajraSources = vajraParam
      ? [vajraParam]
      : VAJRA_CLIPS.slice(0, vajraCount);
    const TILE_GAP = 1;
    const GLYPH_W = 5;
    const GLYPH_H = 7;

    const GLYPHS = {
      h: [0x11, 0x11, 0x11, 0x1f, 0x11, 0x11, 0x11],
      y: [0x11, 0x11, 0x11, 0x0a, 0x04, 0x04, 0x04],
      p: [0x1e, 0x11, 0x11, 0x1e, 0x10, 0x10, 0x10],
      e: [0x0e, 0x11, 0x10, 0x1e, 0x10, 0x11, 0x0e],
      r: [0x1e, 0x11, 0x11, 0x1e, 0x14, 0x12, 0x11],
      s: [0x0e, 0x11, 0x10, 0x0e, 0x01, 0x11, 0x0e],
      t: [0x1f, 0x04, 0x04, 0x04, 0x04, 0x04, 0x04],
      i: [0x04, 0x00, 0x04, 0x04, 0x04, 0x04, 0x0e],
      o: [0x0e, 0x11, 0x11, 0x11, 0x11, 0x11, 0x0e],
      n: [0x11, 0x19, 0x15, 0x13, 0x11, 0x11, 0x11]
    };

    const LETTER_COLORS_BY_INDEX = [
      "silver", "yellow", "purple", "cyan", "red", "silver",
      "white", "white", "cyan", "magenta", "orange", "blue"
    ];

    const REFERENCE_SWATCHES = {
      black: "#1c1c1e", silver: "#c0c0c8", gray: "#8e8e93", white: "#f5f5f7",
      red: "#ff3b30", orange: "#ff9500", yellow: "#ffd60a", green: "#34c759",
      cyan: "#32d3ff", blue: "#0a84ff", purple: "#bf5af2", magenta: "#ff2d92"
    };

    const FALLBACK_CHAIN = {
      black: ["black", "gray", "silver"],
      silver: ["silver", "gray", "white", "black"],
      gray: ["gray", "silver", "black", "white"],
      white: ["white", "silver", "gray"],
      red: ["red", "orange", "gray", "silver"],
      orange: ["orange", "yellow", "gray", "silver"],
      yellow: ["yellow", "gray", "silver", "white"],
      green: ["green", "gray", "silver"],
      cyan: ["cyan", "blue", "gray", "silver"],
      blue: ["blue", "cyan", "gray", "silver"],
      purple: ["purple", "magenta", "gray", "silver"],
      magenta: ["magenta", "purple", "gray", "silver"]
    };

    const canvas = document.getElementById("stage");
    const ctx = canvas.getContext("2d");
    const moonVideo = document.getElementById("moonVideo");
    const vajraVideoRoot = document.getElementById("vajraVideos");
    let vajraVideos = [];
    let vajraLanes = [];
    let vajraReady = false;
    let imagePools = {};
    let frameIdx = 0;
    let moonReady = false;
    let centerX = 0;
    let centerY = 0;
    let moonRadius = 200;
    let haloRadiusX = 520;
    let haloRadiusY = 160;

    function clamp01(value) {
      if (!Number.isFinite(value)) return 0.5;
      return Math.max(0, Math.min(1, value));
    }

    function clampNum(value, lo, hi) {
      if (!Number.isFinite(value)) return lo;
      return Math.max(lo, Math.min(hi, value));
    }

    function letterColorAt(index) {
      return LETTER_COLORS_BY_INDEX[index] || "silver";
    }

    function resize() {
      const dpr = Math.min(2, window.devicePixelRatio || 1);
      canvas.width = Math.floor(window.innerWidth * dpr);
      canvas.height = Math.floor(window.innerHeight * dpr);
      centerX = canvas.width * 0.5;
      centerY = canvas.height * 0.5;
      const minDim = Math.min(canvas.width, canvas.height);
      moonRadius = minDim * 0.19;
      haloRadiusX = minDim * 0.38;
      haloRadiusY = minDim * 0.28;
      rebuildVajraLanes();
    }

    function rebuildVajraLanes() {
      const n = vajraVideos.length;
      vajraLanes = [];
      for (let i = 0; i < n; i++) {
        const mid = (n - 1) * 0.5;
        const offset = n > 1 ? (i - mid) / Math.max(1, mid) : 0;
        vajraLanes.push({
          radiusX: haloRadiusX * (1 + offset * 0.09),
          radiusY: haloRadiusY * (1 - offset * 0.07 + (i % 2) * 0.05),
          tilt: offset * 0.2 + i * 0.04,
          phase: (i / Math.max(1, n)) * Math.PI * 2 + Math.PI * 0.2,
          spin: 1.06 + i * 0.03,
          scale: 1 - Math.abs(offset) * 0.07
        });
      }
    }

    async function loadImage(url) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = () => resolve(null);
        img.src = url;
      });
    }

    async function buildPools(index) {
      imagePools = { any: [] };
      const families = index && index.families ? index.families : {};
      for (const family of Object.keys(families)) {
        imagePools[family] = [];
        for (const row of families[family] || []) {
          if (!row || !row.cubeUrl) continue;
          const img = await loadImage(row.cubeUrl);
          if (img) {
            imagePools[family].push(img);
            imagePools.any.push(img);
          }
        }
      }
    }

    function pickImage(family, seed) {
      const chain = FALLBACK_CHAIN[family] || [family, "silver", "gray", "any"];
      for (let i = 0; i < chain.length; i++) {
        const pool = imagePools[chain[i]];
        if (pool && pool.length > 0) {
          return pool[Math.abs((frameIdx * 5 + seed * 19) % pool.length)];
        }
      }
      return imagePools.any && imagePools.any.length ? imagePools.any[0] : null;
    }

    function loadMoonVideo() {
      return new Promise((resolve) => {
        moonVideo.src = MOON_SRC;
        moonVideo.muted = true;
        moonVideo.playsInline = true;
        let settled = false;
        const finish = (ok) => {
          if (settled) return;
          settled = true;
          moonReady = ok && moonVideo.readyState >= 2 && moonVideo.videoWidth > 0;
          resolve(moonReady);
        };
        moonVideo.addEventListener("loadeddata", () => finish(true), { once: true });
        moonVideo.addEventListener("canplay", () => finish(true), { once: true });
        moonVideo.addEventListener("error", () => finish(false), { once: true });
        const playPromise = moonVideo.play();
        if (playPromise && typeof playPromise.catch === "function") {
          playPromise.catch(() => {});
        }
        setTimeout(() => finish(moonVideo.readyState >= 2 && moonVideo.videoWidth > 0), 8000);
      });
    }

    function loadVajraVideoElement(src) {
      return new Promise((resolve) => {
        const video = document.createElement("video");
        video.muted = true;
        video.playsInline = true;
        video.loop = true;
        video.preload = "auto";
        vajraVideoRoot.appendChild(video);
        let settled = false;
        const finish = (ok) => {
          if (settled) return;
          settled = true;
          resolve({
            src,
            video,
            ready: ok && video.readyState >= 2 && video.videoWidth > 0
          });
        };
        video.addEventListener("loadeddata", () => finish(true), { once: true });
        video.addEventListener("canplay", () => finish(true), { once: true });
        video.addEventListener("error", () => finish(false), { once: true });
        video.src = src;
        const playPromise = video.play();
        if (playPromise && typeof playPromise.catch === "function") {
          playPromise.catch(() => {});
        }
        setTimeout(() => finish(video.readyState >= 2 && video.videoWidth > 0), 15000);
      });
    }

    async function loadVajraVideos() {
      if (!showVajras) {
        vajraVideos = [];
        vajraReady = false;
        return;
      }
      const loaded = await Promise.all(vajraSources.map((src) => loadVajraVideoElement(src)));
      vajraVideos = loaded.filter((row) => row.ready);
      vajraReady = vajraVideos.length > 0;
      rebuildVajraLanes();
    }

    function drawVajraVideoAt(video, cx, cy, size) {
      const vw = video.videoWidth;
      const vh = video.videoHeight;
      if (!vw || !vh) return;
      const scale = Math.min(size / vw, size / vh);
      const dw = vw * scale;
      const dh = vh * scale;
      ctx.save();
      ctx.globalAlpha = 0.92;
      ctx.globalCompositeOperation = "screen";
      ctx.drawImage(video, cx - dw * 0.5, cy - dh * 0.5, dw, dh);
      ctx.restore();
    }

    function orbitPointLane(angle, orbitTilt, lane) {
      const x = Math.cos(angle) * lane.radiusX;
      const y = Math.sin(angle) * lane.radiusY;
      const tilt = orbitTilt + lane.tilt;
      const cosT = Math.cos(tilt);
      const sinT = Math.sin(tilt);
      return {
        cx: centerX + x * cosT - y * sinT,
        cy: centerY + x * sinT + y * cosT,
        depth: (Math.sin(angle + tilt * 0.65) + 1) * 0.5
      };
    }

    function drawOrbitingVajra(rotation, orbitTilt) {
      if (!vajraReady || vajraVideos.length === 0) return;
      const minDim = Math.min(canvas.width, canvas.height);
      const n = vajraVideos.length;
      for (let i = 0; i < n; i++) {
        const lane = vajraLanes[i];
        if (!lane) continue;
        const angle = rotation * lane.spin + orbitTilt * 0.32 + lane.phase;
        const point = orbitPointLane(angle, orbitTilt, lane);
        const size = minDim * vajraScale * lane.scale;
        drawVajraVideoAt(vajraVideos[i].video, point.cx, point.cy, size);
      }
    }

    function drawBackground() {
      const bg = ctx.createRadialGradient(centerX, centerY, moonRadius * 0.4, centerX, centerY, canvas.width * 0.65);
      bg.addColorStop(0, "#0a1020");
      bg.addColorStop(0.45, "#03050c");
      bg.addColorStop(1, "#000");
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    function orbitTiltAt(frame) {
      return orbitTiltStart + frame * orbitTiltStep;
    }

    function orbitPoint(angle, orbitTilt) {
      const x = Math.cos(angle) * haloRadiusX;
      const y = Math.sin(angle) * haloRadiusY;
      const cosT = Math.cos(orbitTilt);
      const sinT = Math.sin(orbitTilt);
      return {
        cx: centerX + x * cosT - y * sinT,
        cy: centerY + x * sinT + y * cosT,
        depth: (Math.sin(angle + orbitTilt * 0.65) + 1) * 0.5
      };
    }

    function orbitPointForShape(angle, orbitTilt) {
      return orbitPoint(angle, orbitTilt);
    }

    function drawVajraOrbitGuides(orbitTilt) {
      if (!showVajras || vajraLanes.length === 0) return;
      ctx.save();
      ctx.lineWidth = Math.max(1, canvas.width * 0.001);
      for (let i = 0; i < vajraLanes.length; i++) {
        const lane = vajraLanes[i];
        ctx.strokeStyle = `rgba(140, 180, 255, ${0.05 + i * 0.015})`;
        ctx.beginPath();
        ctx.ellipse(
          centerX,
          centerY,
          lane.radiusX,
          lane.radiusY,
          orbitTilt + lane.tilt,
          0,
          Math.PI * 2
        );
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawOrbitGuides(rotation, orbitTilt) {
      drawHaloGuides(rotation, orbitTilt);
      if (showVajras) {
        drawVajraOrbitGuides(orbitTilt);
      }
    }

    function drawHaloGuides(rotation, orbitTilt) {
      ctx.save();
      ctx.translate(centerX, centerY);
      ctx.rotate(rotation * 0.08);
      ctx.strokeStyle = "rgba(140,190,255,0.12)";
      ctx.lineWidth = Math.max(1, canvas.width * 0.0015);
      ctx.beginPath();
      ctx.ellipse(0, 0, haloRadiusX, haloRadiusY, orbitTilt, 0, Math.PI * 2);
      ctx.stroke();
      const glow = ctx.createRadialGradient(0, 0, moonRadius * 1.05, 0, 0, haloRadiusX * 1.05);
      glow.addColorStop(0, "rgba(120,180,255,0.08)");
      glow.addColorStop(0.55, "rgba(80,140,255,0.04)");
      glow.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.ellipse(0, 0, haloRadiusX * 1.08, haloRadiusY * 1.25, orbitTilt, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function drawCenterMoon() {
      if (!moonReady) {
        ctx.fillStyle = "#222";
        ctx.beginPath();
        ctx.arc(centerX, centerY, moonRadius, 0, Math.PI * 2);
        ctx.fill();
        return;
      }
      ctx.save();
      ctx.beginPath();
      ctx.arc(centerX, centerY, moonRadius, 0, Math.PI * 2);
      ctx.clip();
      ctx.fillStyle = "#030308";
      ctx.fillRect(centerX - moonRadius, centerY - moonRadius, moonRadius * 2, moonRadius * 2);
      const vw = moonVideo.videoWidth;
      const vh = moonVideo.videoHeight;
      const diameter = moonRadius * 2;
      const fitScale = moonFit === "cover"
        ? Math.max(diameter / vw, diameter / vh)
        : Math.min(diameter / vw, diameter / vh);
      const scale = fitScale * moonScale;
      const dw = vw * scale;
      const dh = vh * scale;
      const dx = centerX - moonFocusX * dw;
      const dy = centerY - moonFocusY * dh;
      ctx.drawImage(moonVideo, dx, dy, dw, dh);

      const vignette = ctx.createRadialGradient(
        centerX,
        centerY,
        moonRadius * 0.58,
        centerX,
        centerY,
        moonRadius
      );
      vignette.addColorStop(0, "rgba(0,0,0,0)");
      vignette.addColorStop(1, "rgba(0,0,0,0.5)");
      ctx.fillStyle = vignette;
      ctx.fillRect(centerX - moonRadius, centerY - moonRadius, moonRadius * 2, moonRadius * 2);

      const specX = centerX - moonRadius * 0.26;
      const specY = centerY - moonRadius * 0.3;
      const specular = ctx.createRadialGradient(specX, specY, 0, specX, specY, moonRadius * 0.72);
      specular.addColorStop(0, "rgba(255,255,255,0.28)");
      specular.addColorStop(0.42, "rgba(255,255,255,0)");
      specular.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = specular;
      ctx.fillRect(centerX - moonRadius, centerY - moonRadius, moonRadius * 2, moonRadius * 2);
      ctx.restore();

      ctx.save();
      ctx.shadowColor = "rgba(180,210,255,0.45)";
      ctx.shadowBlur = moonRadius * 0.35;
      ctx.strokeStyle = "rgba(210,230,255,0.28)";
      ctx.lineWidth = Math.max(2, moonRadius * 0.015);
      ctx.beginPath();
      ctx.arc(centerX, centerY, moonRadius * 1.02, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }

    function drawLetterMosaic(ch, color, cx, cy, tilePx, rotation, depth, seedBase) {
      const rows = GLYPHS[ch];
      if (!rows) return;
      const blockW = GLYPH_W * (tilePx + TILE_GAP) - TILE_GAP;
      const blockH = GLYPH_H * (tilePx + TILE_GAP) - TILE_GAP;
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(rotation);
      ctx.globalAlpha = 0.5 + depth * 0.5;
      ctx.translate(-blockW * 0.5, -blockH * 0.5);
      for (let gy = 0; gy < GLYPH_H; gy++) {
        const rowBits = rows[gy] || 0;
        for (let gx = 0; gx < GLYPH_W; gx++) {
          const bit = (rowBits >> (GLYPH_W - 1 - gx)) & 1;
          if (!bit) continue;
          const x = gx * (tilePx + TILE_GAP);
          const y = gy * (tilePx + TILE_GAP);
          const img = pickImage(color, seedBase + gx * 17 + gy * 29);
          if (img) {
            ctx.drawImage(img, x, y, tilePx, tilePx);
          } else {
            ctx.fillStyle = REFERENCE_SWATCHES[color] || "#888";
            ctx.fillRect(x, y, tilePx, tilePx);
          }
          ctx.strokeStyle = "rgba(255,255,255,0.1)";
          ctx.strokeRect(x + 0.5, y + 0.5, tilePx - 1, tilePx - 1);
        }
      }
      ctx.restore();
    }

    function computeLetterSlots(rotation, orbitTilt) {
      const slots = [];
      const n = WORD.length;
      const arcCenter = Math.PI * 0.5;
      const arcSpan = Math.PI * 0.52;
      const angleStep = n > 1 ? arcSpan / (n - 1) : 0;
      for (let i = 0; i < n; i++) {
        const angle = arcCenter - i * angleStep + rotation - letterLeadBack;
        const point = orbitPointForShape(angle, orbitTilt);
        const scale = 0.72 + point.depth * 0.38;
        const tilePx = Math.max(6, Math.floor(Math.min(canvas.width, canvas.height) * 0.0105 * scale));
        slots.push({
          i,
          ch: WORD[i],
          color: letterColorAt(i),
          cx: point.cx,
          cy: point.cy,
          rotation: 0,
          depth: point.depth,
          tilePx,
          seedBase: i * 131
        });
      }
      slots.sort((a, b) => a.depth - b.depth);
      return slots;
    }

    function drawFrame() {
      const rotation = haloStart + frameIdx * haloSpin;
      const orbitTilt = orbitTiltAt(frameIdx);
      drawBackground();
      drawOrbitGuides(rotation, orbitTilt);
      drawCenterMoon();
      const slots = computeLetterSlots(rotation, orbitTilt);
      for (let s = 0; s < slots.length; s++) {
        const slot = slots[s];
        drawLetterMosaic(
          slot.ch,
          slot.color,
          slot.cx,
          slot.cy,
          slot.tilePx,
          slot.rotation,
          slot.depth,
          slot.seedBase
        );
      }
      if (showVajras) {
        drawOrbitingVajra(rotation, orbitTilt);
      }
      frameIdx += 1;
      requestAnimationFrame(drawFrame);
    }

    async function boot() {
      resize();
      window.addEventListener("resize", resize);
      window.__hyperstitionStats = {
        layout: "halo",
        word: WORD,
        moonVideo: MOON_SRC,
        moonFocusX,
        moonFocusY,
        moonFit,
        moonScale,
        haloStart,
        haloSpin,
        letterLeadBack,
        orbitTiltStart,
        orbitTiltStep,
        orbitShape,
        showVajras,
        vajraSources,
        vajraCount: vajraSources.length,
        vajraReady: false,
        moonReady: false,
        letterCount: WORD.length,
        pools: []
      };

      const syncStats = () => {
        window.__hyperstitionStats = {
          layout: "halo",
          word: WORD,
          moonVideo: MOON_SRC,
          moonFocusX,
          moonFocusY,
        moonFit,
        moonScale,
        haloStart,
        haloSpin,
        letterLeadBack,
        orbitTiltStart,
        orbitTiltStep,
        orbitShape,
        showVajras,
        vajraSources,
        vajraCount: vajraSources.length,
        vajraReady,
        moonReady,
          letterCount: WORD.length,
          pools: Object.keys(imagePools).map((k) => ({ family: k, count: (imagePools[k] || []).length }))
        };
      };

      const moonTask = loadMoonVideo().then(() => syncStats());
      const vajraTask = loadVajraVideos().then(() => syncStats());
      const poolTask = (async () => {
        try {
          const res = await fetch(INDEX_URL, { cache: "no-store" });
          if (res.ok) {
            await buildPools(await res.json());
          }
        } catch (err) {
          console.warn(err);
        }
        syncStats();
      })();

      await Promise.all([moonTask, vajraTask, poolTask]);
      window.__hyperstitionReady = true;
      syncStats();
      drawFrame();
    }

    boot();
  </script>
</body>
</html>
