      let aMinU = 1, aMaxU = 0, aMinV = 1, aMaxV = 0, aCount = 0, aSumU = 0, aSumV = 0;
      for (let py = 0; py < SAMPLE_H; py++) {
        const v = 1 - (py + 0.5) / SAMPLE_H; // canvas is top-down, UV is bottom-up
        for (let px = 0; px < SAMPLE_W; px++) {
          if (data[(py * SAMPLE_W + px) * 4 + 3] < 235) continue; // skip the glow halo
          const u = (px + 0.5) / SAMPLE_W;
          aCount++;
          aSumU += u;
          aSumV += v;
          if (u < aMinU) aMinU = u;
          if (u > aMaxU) aMaxU = u;
          if (v < aMinV) aMinV = v;
          if (v > aMaxV) aMaxV = v;
        }
      }
      if (aCount > 40) {
        // Centre from the mask centroid, not the bbox midpoint: the bbox
        // quantises to the coarse sample grid (~2px on screen and worse on
        // big displays), while the centroid of a solid disc is sub-pixel
        // accurate - the iris hole, backdrop gif and centering all ride on it.
        disc.x = aSumU / aCount;
        disc.y = aSumV / aCount;
        const rX = ((aMaxU - aMinU) / 2) * (16 / 9);
        const rY = (aMaxV - aMinV) / 2;
        disc.r = Math.min(rX, rY) * 0.99;
        uniforms.uDisc.value.set(disc.x, disc.y, disc.r);
      }
    }

    // Pass 2: histogram the lumas of the LIT surface. The deep shadow at the
    // limb is static (the lighting is fixed), so it is excluded — the target
    // is the darkest patch of the visible surface (the maria), which rotates
    // around WITH the moon. The cutoff adapts to the darkest QUANTILE of the
    // lit pixels (?trackthresh= pins a fixed cutoff instead).
    // Ignore the outer ring: limb darkening there is lighting, not maria.
    const rIn = disc.r * 0.84;
    const hist = new Uint16Array(256);
    let litCount = 0;
    const lumaAt = (i) => (0.2126 * data[i] + 0.7152 * data[i + 1] + 0.0722 * data[i + 2]) / 255;
    const inDisc = (px, py) => {
      const u = (px + 0.5) / SAMPLE_W;
      const v = 1 - (py + 0.5) / SAMPLE_H;
      const dx = (u - disc.x) * (16 / 9), dy = v - disc.y;
      return dx * dx + dy * dy <= rIn * rIn;
    };
    for (let py = 0; py < SAMPLE_H; py++) {
      for (let px = 0; px < SAMPLE_W; px++) {
        const i = (py * SAMPLE_W + px) * 4;
        if (data[i + 3] < 235 || !inDisc(px, py)) continue;
        const luma = lumaAt(i);
        if (luma <= SHADOW_FLOOR) continue; // static terminator shadow
        hist[Math.min(255, Math.floor(luma * 255))]++;
        litCount++;
      }
    }
    if (litCount < 40) return null;
    let cutoff = TRACK_THRESH;
    if (params.get("trackthresh") == null) {
      let acc = 0, bin = 0;
      const want = litCount * QUANTILE;
      while (bin < 255 && acc < want) acc += hist[bin++];
      cutoff = Math.max(SHADOW_FLOOR + 0.02, Math.min(0.6, bin / 255));
    }

    // Pass 3: map every dark lit pixel back into the rotating surface frame
    // (undo the current rotation) and accumulate darkness per lon/lat cell.
    for (let py = 0; py < SAMPLE_H; py++) {
      const v = 1 - (py + 0.5) / SAMPLE_H;
      for (let px = 0; px < SAMPLE_W; px++) {
        const i = (py * SAMPLE_W + px) * 4;
        if (data[i + 3] < 235 || !inDisc(px, py)) continue;
        const luma = lumaAt(i);
        if (luma <= SHADOW_FLOOR || luma > cutoff) continue;
        const u = (px + 0.5) / SAMPLE_W;
        const nx = ((u - disc.x) * (16 / 9)) / disc.r;
        const ny = (v - disc.y) / disc.r;
        const r2 = nx * nx + ny * ny;
        if (r2 >= 1) continue;
        const nz = Math.sqrt(1 - r2);
        if (nz < 0.35) continue; // too foreshortened near the limb to trust
        const lon = Math.atan2(nx, nz);
        const lat = Math.asin(Math.max(-1, Math.min(1, ny)));
        const surfLon = wrapPi(lon - rot);
        const bLon = Math.min(GRID_LON - 1, Math.floor((surfLon + Math.PI) / (2 * Math.PI) * GRID_LON));
        const bLat = Math.min(GRID_LAT - 1, Math.floor((lat + Math.PI / 2) / Math.PI * GRID_LAT));
        surfGrid[bLat * GRID_LON + bLon] += cutoff - luma + 0.01;
      }
    }
  }

  const anchorTarget = { lon: 0, lat: 0 };
  // The word's angular footprint grows/shrinks to fill the measured patch
  // unless the caller pinned it via ?angw= / ?angh=.
  let AUTO_ANG = params.get("angw") == null && params.get("angh") == null;
  const angTarget = { w: ANG_W, h: ANG_H };
  // Master multiplier on the window/word footprint, live from the
  // controller: 1 = as measured, 2 = twice the angular size.
  let WIN_SCALE = num("winscale", 1);
  let haveAnchor = false;
  let anchorLocked = false;
  let lastSampleT = -Infinity;

  function pickAnchor() {
    let bestScore = 0, bestLon = 0, bestLat = 0;
    for (let la = 1; la < GRID_LAT - 1; la++) {
      for (let lo = 0; lo < GRID_LON; lo++) {
        let s = 0;
        for (let dla = -1; dla <= 1; dla++) {
          for (let dlo = -1; dlo <= 1; dlo++) {
            s += surfGrid[(la + dla) * GRID_LON + ((lo + dlo + GRID_LON) % GRID_LON)];
          }
        }
        if (s > bestScore) { bestScore = s; bestLon = lo; bestLat = la; }
      }
    }
    if (bestScore <= 0) return;
    const lon0 = (bestLon + 0.5) / GRID_LON * 2 * Math.PI - Math.PI;
    const lat0 = (bestLat + 0.5) / GRID_LAT * Math.PI - Math.PI / 2;

    // Measure the patch's angular spread around the anchor so the word can
    // fill it: darkness-weighted centroid + deviation over nearby cells.
    let wSum = 0, mLon = 0, mLat = 0, vLon = 0, vLat = 0;
    const cellLonStep = 2 * Math.PI / GRID_LON, cellLatStep = Math.PI / GRID_LAT;
    for (let la = 0; la < GRID_LAT; la++) {
      const lat = (la + 0.5) * cellLatStep - Math.PI / 2;
      const dLat = lat - lat0;
      if (Math.abs(dLat) > 1.0) continue;
      for (let lo = 0; lo < GRID_LON; lo++) {
        const wgt = surfGrid[la * GRID_LON + lo];
        if (wgt <= 0) continue;
        const dLon = wrapPi((lo + 0.5) * cellLonStep - Math.PI - lon0);
        if (Math.abs(dLon) > 1.4) continue;
        wSum += wgt;
        mLon += dLon * wgt; mLat += dLat * wgt;
        vLon += dLon * dLon * wgt; vLat += dLat * dLat * wgt;
      }
    }
    let latMax = Math.PI / 2 - angTarget.h / 2 - 0.08;
    if (wSum > 0) {
      const cLon = mLon / wSum, cLat = mLat / wSum;
      const stdLon = Math.sqrt(Math.max(0, vLon / wSum - cLon * cLon));
      const stdLat = Math.sqrt(Math.max(0, vLat / wSum - cLat * cLat));
      anchorTarget.lon = wrapPi(lon0 + cLon + LON_OFF);
      if (AUTO_ANG) {
        angTarget.w = Math.max(0.9, Math.min(2.6, stdLon * 3.6));
        angTarget.h = Math.max(0.55, Math.min(1.5, stdLat * 3.6));
      }
      latMax = Math.PI / 2 - angTarget.h / 2 - 0.08;
      anchorTarget.lat = Math.max(-latMax, Math.min(latMax, lat0 + cLat + LAT_OFF));
    } else {
      anchorTarget.lon = wrapPi(lon0 + LON_OFF);
      anchorTarget.lat = Math.max(-latMax, Math.min(latMax, lat0 + LAT_OFF));
    }
    haveAnchor = true;
  }

  function rotationPeriod() {
    return ROT_PER > 0 ? ROT_PER : (moon.video.duration || 6);
  }

  function updateMosaicAnchor(t) {
    const per = rotationPeriod();
    const rot = ROT_DIR * 2 * Math.PI * ((moon.video.currentTime % per) / per);
    uniforms.uRot.value = rot;
    if (!anchorLocked && t - lastSampleT >= 0.2) {
      lastSampleT = t;
      sampleSurface(rot);
      pickAnchor();
      // One full revolution surveyed: the darkest terrain has won, pin it.
      if (t >= (per / SPEED) * 1.05 + 1) anchorLocked = true;
    }
    if (haveAnchor) {
      const a = uniforms.uAnchor.value;
      a.x += wrapPi(anchorTarget.lon - a.x) * 0.1;
      a.y += (anchorTarget.lat - a.y) * 0.1;
      const g = uniforms.uAng.value;
      const tw = Math.min(2.9, angTarget.w * WIN_SCALE);
      const th = Math.min(2.4, angTarget.h * WIN_SCALE);
      g.x += (tw - g.x) * 0.1;
      g.y += (th - g.y) * 0.1;
      chooseLines(g.x / g.y);
    }
  }

  // Is the anchored box currently on the visible near side? Peeks and
  // incant advances only happen when someone could actually see them.
  function anchorFacing() {
    if (!useMosaic || !haveAnchor) return true;
    const facing = wrapPi(uniforms.uAnchor.value.x + uniforms.uRot.value);
    return Math.abs(facing) < Math.PI * 0.42;
  }

  // Random apparition scheduler: the reveal gate eases in, holds, eases out,
  // then sleeps a randomized interval around APPARITION seconds. incant
  // advances to the next mantra at the start of each apparition.
  const appar = { phase: APPARITION > 0 ? "sleep" : "on", next: 2 + Math.random() * 3, level: APPARITION > 0 ? 0 : 1 };
  function updateApparition(t, dt) {
    if (APPARITION <= 0) {
      appar.level = Math.min(1, appar.level + dt * 1.5);
      appar.phase = "on";
      uniforms.uGate.value = appar.level;
      return;
    }
    if (appar.phase === "on") {
      // Apparitions switched on live: fade out and join the cycle.
      appar.phase = "out";
    }
    if (appar.phase === "sleep" && t >= appar.next) {
      appar.phase = "in";
      if (incant) incant.advance();
    } else if (appar.phase === "in") {
      appar.level += dt / 1.6;
      if (appar.level >= 1) { appar.level = 1; appar.phase = "hold"; appar.next = t + 2.5 + Math.random() * 3.5; }
    } else if (appar.phase === "hold" && t >= appar.next) {
      appar.phase = "out";
    } else if (appar.phase === "out") {
      appar.level -= dt / 2.2;
      if (appar.level <= 0) {
        appar.level = 0;
        appar.phase = "sleep";
        appar.next = t + APPARITION * (0.55 + Math.random() * 0.9);
      }
    }
    uniforms.uGate.value = appar.level;
  }

  // Peek cycle: every PEEK seconds (while the word faces the viewer) the
  // letters dissolve, the window grows, holds for PEEK_HOLD, and restores.
  const peek = { phase: "idle", next: PEEK, wordOn: WORDLESS_WIN ? 0 : 1, grow: WORDLESS_WIN ? PEEK_GROW : 1 };
  function updatePeek(t, dt) {
    if (WORDLESS_WIN || !WIN) return;
    if (PEEK > 0) {
      if (peek.phase === "idle" && t >= peek.next && anchorFacing()) {
        peek.phase = "out";
      } else if (peek.phase === "out") {
        peek.wordOn -= dt / 1.4;
        if (peek.wordOn <= 0) { peek.wordOn = 0; peek.phase = "open"; peek.next = t + PEEK_HOLD; }
      } else if (peek.phase === "open" && t >= peek.next) {
        peek.phase = "in";
      } else if (peek.phase === "in") {
        peek.wordOn += dt / 1.4;
        if (peek.wordOn >= 1) { peek.wordOn = 1; peek.phase = "idle"; peek.next = t + PEEK * (0.8 + Math.random() * 0.5); }
      }
    }
    const growTarget = 1 + (PEEK_GROW - 1) * (1 - peek.wordOn);
    peek.grow += (growTarget - peek.grow) * Math.min(1, dt * 3);
    uniforms.uWordOn.value = peek.wordOn;
    uniforms.uWinGrow.value = peek.grow;
  }

  // Adaptive planar bleed: keep the revealed area near BLEED% of the disc by
  // walking the luma threshold, and center the reveal on the centroid of the
  // shadowed hemisphere (uSpot) rather than wherever the cutoff bites first.
  let lastBleedT = -Infinity;
  function adaptBleed(t) {
    if (useMosaic || BLEED <= 0 || t - lastBleedT < 0.5) return;
    if (moon.video.readyState < 2) return;
    lastBleedT = t;
    sampleCtx.clearRect(0, 0, SAMPLE_W, SAMPLE_H);
    sampleCtx.drawImage(moon.video, 0, 0, SAMPLE_W, SAMPLE_H);
    const data = sampleCtx.getImageData(0, 0, SAMPLE_W, SAMPLE_H).data;
    let discCount = 0, darkCount = 0, cX = 0, cY = 0, cW = 0;
    const thresh = +uniforms.uThresh.value;
    for (let py = 0; py < SAMPLE_H; py++) {
      const v = 1 - (py + 0.5) / SAMPLE_H;
      for (let px = 0; px < SAMPLE_W; px++) {
        const i = (py * SAMPLE_W + px) * 4;
        if (data[i + 3] < 235) continue;
        const u = (px + 0.5) / SAMPLE_W;
        const dx = (u - disc.x) * (16 / 9), dy = v - disc.y;
        if (dx * dx + dy * dy > disc.r * disc.r * 0.92) continue;
        discCount++;
        const luma = (0.2126 * data[i] + 0.7152 * data[i + 1] + 0.0722 * data[i + 2]) / 255;
        if (luma < thresh) darkCount++;
        // Centroid of the whole shadowed side (generous cutoff), skipping the
        // outer ring so the spot lands mid-hemisphere, not on the limb.
        if (luma < 0.16 && dx * dx + dy * dy < disc.r * disc.r * 0.62) {
          const w = 0.16 - luma;
          cX += u * w; cY += v * w; cW += w;
        }
      }
    }
    if (discCount > 50) {
      const frac = darkCount / discCount;
      const target = BLEED / 100;
      // Walk the threshold toward the target area.
      if (frac > target * 1.15) uniforms.uThresh.value = Math.max(0.02, thresh - 0.006);
      else if (frac < target * 0.85) uniforms.uThresh.value = Math.min(0.6, thresh + 0.006);
    }
    if (cW > 0.5) {
      const s = uniforms.uSpot.value;
      const rSpot = disc.r * Math.max(0.18, Math.min(0.55, Math.sqrt(BLEED / 100) * 1.6));
      s.x += (cX / cW - s.x) * 0.2;
      s.y += (cY / cW - s.y) * 0.2;
      s.z = rSpot;
    }
  }

  // --- Program sequencer: long arcs measured in moon rotations -----------
  // A program is a list of acts. Each act repeats [dark rotations - just
  // the word on the dark patch] -> [reveal rotations - the window opens
  // wordless on the act's content] and then hands to the next act, so
  // something only shows through every few rotations and the content
  // progresses. The "hour" program is 204 rotations: ~62 min at the default
  // speed 1/3 with the 6s moon loop (each rotation ~18s of wall time).
  // "eye" is a special program content: instead of opening the dark-side
  // window it loads the eye-seal gif behind the disc (if no backdrop is set)
  // and irises the moon open for that rotation, sealing again on the next.
  const PROGRAMS = {
    hour: [
      { cycles: 8, dark: 2, reveal: 1, content: "crt" },
      { cycles: 8, dark: 2, reveal: 1, content: "incant" },
      { cycles: 8, dark: 2, reveal: 1, content: "vajra" },
      { cycles: 6, dark: 2, reveal: 1, content: "fold" },
      { cycles: 6, dark: 2, reveal: 1, content: "foldhelix" },
      { cycles: 6, dark: 2, reveal: 1, content: "foldjitter" },
      { cycles: 6, dark: 2, reveal: 1, content: "foldgeo" },
      { cycles: 6, dark: 2, reveal: 1, content: "foldivm" },
      { cycles: 6, dark: 2, reveal: 1, content: "foldsonic" },
      { cycles: 8, dark: 2, reveal: 1, content: "artifacts/sample-sonicsphere-silent.webm" }
    ],
    // Word-only moon; the eye seal irises open once every 10th rotation.
    eye10: [
      { cycles: 1, dark: 9, reveal: 1, content: "eye" }
    ],
    // The bucky fold repertoire, a reveal every 3rd rotation.
    folds: [
      { cycles: 2, dark: 2, reveal: 1, content: "fold" },
      { cycles: 2, dark: 2, reveal: 1, content: "foldhelix" },
      { cycles: 2, dark: 2, reveal: 1, content: "foldjitter" },
      { cycles: 2, dark: 2, reveal: 1, content: "foldgeo" },
      { cycles: 2, dark: 2, reveal: 1, content: "foldivm" },
      { cycles: 2, dark: 2, reveal: 1, content: "foldsonic" }
    ],
    // Folds every 3rd rotation with the eye breaking through every 10th.
    eyefolds: [
      { cycles: 1, dark: 2, reveal: 1, content: "fold" },
      { cycles: 1, dark: 2, reveal: 1, content: "foldhelix" },
      { cycles: 1, dark: 2, reveal: 1, content: "foldjitter" },
      { cycles: 1, dark: 0, reveal: 1, content: "eye" }
    ]
  };
  const EYE_BACKDROP = "assets/esoteric-geometries-circles-warp.gif";
  let progEyeOn = false;
  let progSchedule = null; // flat: one entry per rotation, loops forever
  let progName = "";
  let progApplied = -1;
  let progLoops = 0, progPrevVideoT = 0;
  // Accepts a named program ("hour"), a custom act array from the
  // controller's program editor, or a JSON act array in the URL param.
  function setProgram(spec) {
    let acts = null;
    if (Array.isArray(spec)) { acts = spec; progName = "custom"; }
    else {
      const s = String(spec == null ? "" : spec).trim();
      if (s.startsWith("[")) {
        try { acts = JSON.parse(s); progName = "custom"; } catch { acts = null; }
      } else if (PROGRAMS[s.toLowerCase()]) {
        acts = PROGRAMS[s.toLowerCase()];
        progName = s.toLowerCase();
      }
    }
    // Any program change seals an eye reveal the old program left open.
    if (progEyeOn) { IRIS_TARGET = 0; progEyeOn = false; }
    if (!acts || !acts.length) {
      progSchedule = null;
      progName = "";
      return;
    }
    progSchedule = [];
    for (const act of acts) {
      const cycles = Math.max(1, Math.round(+act.cycles || 1));
      const dark = Math.max(0, Math.round(act.dark == null ? 2 : +act.dark));
      const reveal = Math.max(1, Math.round(act.reveal == null ? 1 : +act.reveal));
      const content = String(act.content || "").trim();
      for (let c = 0; c < cycles; c++) {
        for (let d = 0; d < dark; d++) progSchedule.push({ content: "", wordless: false });
        for (let r = 0; r < reveal; r++) progSchedule.push({ content, wordless: true });
      }
    }
    progApplied = -1; // apply the current rotation's entry on the next frame
  }
  function updateProgram() {
    if (!progSchedule || !useMosaic) return;
    const vt = moon.video.currentTime || 0;
    if (vt < progPrevVideoT - 0.5) progLoops++;
    progPrevVideoT = vt;
    const per = rotationPeriod();
    const rot = Math.floor((progLoops * (moon.video.duration || per) + vt) / per);
    if (rot === progApplied) return;
    progApplied = rot;
    const entry = progSchedule[rot % progSchedule.length];
    if (entry.content === "eye") {
      // Iris reveal instead of a window: load the eye seal behind the disc
      // (unless a backdrop is already chosen) and open for this rotation.
      if (!BACKDROP_SRC) setBackdrop(EYE_BACKDROP);
      if (CONTENT_SRC) setWindowContent("");
      IRIS_TARGET = 1;
      progEyeOn = true;
      return;
    }
    if (progEyeOn) { IRIS_TARGET = 0; progEyeOn = false; }
    if (CONTENT_SRC !== entry.content || (WIN && WORDLESS_WIN !== entry.wordless)) {
      setWindowContent(entry.content, entry.wordless);
    }
  }

  const start = performance.now();
  // Screen-capture content can't be built at parse time (it registers its
  // own gesture handler); route it through the live switcher instead.
  if (useMosaic && CONTENT_KEY === "screen") setWindowContent("screen");
  if (params.get("program")) setProgram(params.get("program"));

  // --- Solo bake mode: blit the content maker straight to the screen ------
  let soloCtx = null, soloIncantFrame = -1;
  if (SOLO) {
    renderer.domElement.style.display = "none";
    const c = document.createElement("canvas");
    c.style.cssText = "position:fixed;inset:0;width:100vw;height:100vh;";
    document.body.appendChild(c);
    soloCtx = c.getContext("2d");
    window.__hyperstitionReady = true;
  }
  function soloFrame(t) {
    if (incant) {
      const f = Math.floor(t / 6);
      if (f !== soloIncantFrame) { soloIncantFrame = f; incant.advance(); }
    }
    if (crt) crt.draw(t);
    if (cave) cave.draw(t);
    if (fold) fold.draw(t);
    const cnv = soloCtx.canvas;
    if (cnv.width !== window.innerWidth || cnv.height !== window.innerHeight) {
      cnv.width = window.innerWidth;
      cnv.height = window.innerHeight;
    }
    soloCtx.fillStyle = "#020411";
    soloCtx.fillRect(0, 0, cnv.width, cnv.height);
    const maker = fold || crt || cave || incant;
    const src = maker && maker.texture && maker.texture.image;
    if (src && src.width) {
      // cover-crop the (square) maker canvas into the viewport
      const s = Math.max(cnv.width / src.width, cnv.height / src.height);
      const w = src.width * s, h = src.height * s;
      soloCtx.drawImage(src, (cnv.width - w) / 2, (cnv.height - h) / 2, w, h);
    }
  }

  let prevT = 0;
  function animate() {
    const t = (performance.now() - start) / 1000;
    const dt = Math.min(0.1, t - prevT);
    prevT = t;
    if (SOLO) {
      soloFrame(t);
      requestAnimationFrame(animate);
      return;
    }
    uniforms.uTime.value = t;
    if (SCROLL_SEC > 0 && !contentVideo && !imageTextures.length && !useMosaic) {
      uniforms.uScroll.value = (t / SCROLL_SEC) % 1;
    }
    if (imageTextures.length > 1 && IMAGE_SEC > 0) {
      const slide = imageTextures[Math.floor(t / IMAGE_SEC) % imageTextures.length];
      if (WIN) {
        uniforms.uWinTex.value = slide;
        const img = slide.image;
        if (img && img.width) uniforms.uWinAspect.value = img.width / img.height;
      } else {
        uniforms.uContent.value = slide;
      }
    }
    if (crt) crt.draw(t);
    if (cave) cave.draw(t);
    if (fold) { fold.draw(t); window.__fold = fold; }
    pollMic();
    updateAudio(dt);
    // Music rides on top of the slider bases: earthshine breathes with the
    // bass, window glow shimmers with the highs + beats, content brightness
    // lifts with overall level.
    uniforms.uLift.value = liftBase + REACT * audio.bass * 0.055;
    uniforms.uWinBright.value = winBrightBase * (1 + REACT * (audio.high * 0.55 + audio.beatEnv * 0.3));
    uniforms.uBright.value = brightBase * (1 + REACT * audio.level * 0.3);
    if (mosaic) {
      updateMosaicAnchor(t);
      // Shimmer the tiles by reshuffling cube images a few times a second;
      // loud music shakes them faster (accumulated phase so rate changes
      // don't skip frames).
      mosaicPhase += dt * (2.5 + REACT * audio.level * 6);
      const frame = Math.floor(mosaicPhase);
      if (frame !== mosaicFrame) {
        mosaicFrame = frame;
        mosaic.redraw();
      }
    }
    updateProgram();
    updateApparition(t, dt);
    updatePeek(t, dt);
    adaptBleed(t);
    updateVajras(t);
    // Ease the iris toward its target over ~IRIS_SEC with a smooth ramp.
    {
      const cur = uniforms.uIris.value;
      const step = dt / IRIS_SEC;
      uniforms.uIris.value = Math.abs(IRIS_TARGET - cur) <= step
        ? IRIS_TARGET
        : cur + Math.sign(IRIS_TARGET - cur) * step;
    }
    centerQuad();
    positionBackdrop();
    zoomBackdrop();
    renderer.render(scene, camera);
    requestAnimationFrame(animate);
  }
  animate();

  // --- Controller link (BroadcastChannel 'hypermoon') --------------------
  // The controller.html hypermoon panel drives this window live and asks it
  // to report its state (that is what flips the panel from "no hypermoon
  // window connected" to showing the export query). Without this handshake
  // the controller never sees the output. Unknown keys are stored and echoed
  // back so future sliders stay coherent.
  const hmChannel = ("BroadcastChannel" in window) ? new BroadcastChannel("hypermoon") : null;
  const extraState = {};

  function buildQuery() {
    const q = new URLSearchParams();
    q.set("video", MOON_SRC);
    if (MOSAIC_WORD) q.set("word", MOSAIC_WORD);
    if (CONTENT_SRC) q.set("content", CONTENT_SRC);
    q.set("speed", SPEED.toFixed(3));
    q.set("bright", brightBase.toFixed(3));
    q.set("threshold", (+uniforms.uThresh.value).toFixed(3));
    q.set("feather", (+uniforms.uFeather.value).toFixed(3));
    q.set("lift", liftBase.toFixed(3));
    if (ALPHA !== 1) q.set("alpha", ALPHA.toFixed(2));
    if (IRIS_TARGET > 0) q.set("iris", IRIS_TARGET.toFixed(2));
    if (IRIS_R !== 0.7) q.set("irisr", IRIS_R.toFixed(2));
    if (IRIS_FEATHER !== 0.22) q.set("irisfeather", IRIS_FEATHER.toFixed(2));
    if (IRIS_ZOOM !== 2.5) q.set("iriszoom", IRIS_ZOOM.toFixed(2));
    if (MOON_SCALE !== 1) q.set("moonscale", MOON_SCALE.toFixed(2));
    if (BLOOD_AMT > 0) {
      q.set("bloodmoon", BLOOD_AMT.toFixed(2));
      if (BLOOD_TINT !== "ff2c12") q.set("bloodtint", BLOOD_TINT);
    }
    if (BACKDROP_SRC) {
      q.set("backdrop", BACKDROP_SRC);
      if (BACK_SCALE !== 1) q.set("backscale", BACK_SCALE.toFixed(2));
      if (BACK_ALPHA !== 1) q.set("backalpha", BACK_ALPHA.toFixed(2));
      if (BACK_SEC !== 12) q.set("backsec", BACK_SEC.toFixed(1));
      if (BACK_SPEED !== 1) q.set("backspeed", BACK_SPEED.toFixed(2));
    }
    if (REACT !== 1) q.set("react", REACT.toFixed(2));
    if (MIC) q.set("mic", "1");
    q.set("flicker", (+uniforms.uFlicker.value).toFixed(2));
    q.set("angw", (+uniforms.uAng.value.x).toFixed(2));
    q.set("angh", (+uniforms.uAng.value.y).toFixed(2));
    if (WIN_SCALE !== 1) q.set("winscale", WIN_SCALE.toFixed(2));
    q.set("lonoff", (LON_OFF * 180 / Math.PI).toFixed(0));
    q.set("latoff", (LAT_OFF * 180 / Math.PI).toFixed(0));
    if (VAJRA_COUNT > 0) {
      q.set("vajras", String(VAJRA_COUNT));
      q.set("vajraradius", VAJRA_RADIUS.toFixed(2));
    }
    if (BLEED > 0) q.set("bleed", BLEED.toFixed(1));
    if (APPARITION > 0) q.set("apparition", APPARITION.toFixed(1));
    if (PEEK > 0 && WIN) q.set("peek", PEEK.toFixed(0));
    if (CONTENT_KEY === "crt") q.set("when", WHEN);
    for (const k in extraState) {
      if (extraState[k] != null && !q.has(k)) q.set(k, String(extraState[k]));
    }
    return q.toString();
  }

  function currentState() {
    return Object.assign({
      speed: SPEED,
      bright: brightBase,
      thresh: +uniforms.uThresh.value,
      feather: +uniforms.uFeather.value,
      lift: liftBase,
      alpha: ALPHA,
      iris: IRIS_TARGET,
      irisr: IRIS_R,
      irisfeather: IRIS_FEATHER,
      iriszoom: IRIS_ZOOM,
      moonscale: MOON_SCALE,
      bloodmoon: BLOOD_AMT,
      bloodtint: BLOOD_TINT,
      backdrop: BACKDROP_SRC,
      backscale: BACK_SCALE,
      backalpha: BACK_ALPHA,
      backsec: BACK_SEC,
      backspeed: BACK_SPEED,
      react: REACT,
      mic: MIC,
      flicker: +uniforms.uFlicker.value,
      angw: +uniforms.uAng.value.x,
      angh: +uniforms.uAng.value.y,
      winscale: WIN_SCALE,
      lon: LON_OFF * 180 / Math.PI,
      lat: LAT_OFF * 180 / Math.PI,
      vajras: VAJRA_COUNT,
      vajraRadius: VAJRA_RADIUS,
      bleed: BLEED,
      apparition: APPARITION,
      when: WHEN,
      program: progName,
      programRot: progApplied,
      programLen: progSchedule ? progSchedule.length : 0,
      rotSeconds: rotationPeriod() / Math.max(SPEED, 0.001),
      streaming: !!streamSession,
      streamStatus: streamStatus
    }, extraState);
  }

  function announce() {
    if (!hmChannel) return;
    hmChannel.postMessage({
      type: "moonState",
      query: buildQuery(),
      state: currentState(),
      sources: { video: MOON_SRC, word: MOSAIC_WORD, content: CONTENT_SRC }
    });
  }

  function applyLiveConfig(set) {
    if (!set || typeof set !== "object") return;
    for (const key in set) {
      const v = set[key];
      switch (key) {
        // Chrome throws on playbackRate < 0.0625; clamp so a low slider
        // value slows to minimum instead of aborting the whole config batch.
        case "speed": SPEED = Math.max(0.0625, v); moon.video.playbackRate = SPEED; break;
        case "bright": brightBase = v; uniforms.uBright.value = v; break;
        case "thresh": uniforms.uThresh.value = v; break;
        case "feather": uniforms.uFeather.value = v; break;
        case "lift": liftBase = v; uniforms.uLift.value = v; break;
        case "alpha": ALPHA = Math.max(0, Math.min(1, v)); uniforms.uAlpha.value = ALPHA; break;
        case "iris": IRIS_TARGET = Math.max(0, Math.min(1, v)); break;
        case "irisr": IRIS_R = Math.max(0.1, Math.min(1, v)); uniforms.uIrisR.value = IRIS_R; break;
        case "irisfeather": IRIS_FEATHER = Math.max(0.01, v); uniforms.uIrisFeather.value = IRIS_FEATHER; break;
        case "bloodmoon": BLOOD_AMT = Math.max(0, Math.min(1, v)); uniforms.uBloodAmt.value = BLOOD_AMT; break;
        case "bloodtint": {
          const hex = String(v).replace(/[^0-9a-fA-F]/g, "");
          if (hex.length === 6 || hex.length === 3) { BLOOD_TINT = hex; uniforms.uBlood.value.set("#" + hex); }
          break;
        }
        case "irissec": IRIS_SEC = Math.max(0.1, v); break;
        case "backdrop": setBackdrop(v); break;
        case "backscale": BACK_SCALE = Math.max(0.05, v); break;
        case "backalpha": BACK_ALPHA = Math.max(0, Math.min(1, v)); break;
        case "backsec": BACK_SEC = Math.max(0, v); setBackdrop(BACKDROP_SRC); break;
        case "backspeed": BACK_SPEED = Math.max(0.1, v); break;
        case "iriszoom": IRIS_ZOOM = Math.max(1, v); break;
        case "moonscale": MOON_SCALE = Math.max(0.1, Math.min(2, v)); fitQuad(); break;
        case "react": REACT = Math.max(0, v); break;
        case "mic": setMic(!!v && v !== "0"); break;
        case "flicker": uniforms.uFlicker.value = v; break;
        case "angw": AUTO_ANG = false; angTarget.w = v; break;
        case "angh": AUTO_ANG = false; angTarget.h = v; break;
        case "winscale": WIN_SCALE = Math.max(0.3, v); break;
        case "lon": LON_OFF = v * (Math.PI / 180); pickAnchor(); break;
        case "lat": LAT_OFF = v * (Math.PI / 180); pickAnchor(); break;
        case "vajras": setVajraCount(v); break;
        case "vajraRadius":
        case "vajraradius": VAJRA_RADIUS = v; break;
        case "stream": setStreaming(!!v && v !== "0"); break;
        case "bleed": BLEED = Math.max(0, v); break;
        case "apparition": APPARITION = Math.max(0, v); break;
        case "peek": PEEK = Math.max(0, v); break;
        case "word":
          MOSAIC_WORD = String(v || "").trim().toLowerCase() || MOSAIC_WORD;
          if (mosaic) {
            mosaic.setWord(MOSAIC_WORD);
            chooseLines(uniforms.uAng.value.x / uniforms.uAng.value.y);
          }
          break;
        case "when":
          WHEN = String(v || "").trim() || WHEN;
          if (crt) crt.setWhen();
          break;
        case "program": setProgram(v); break;
        case "content":
          // Manual content choice takes over from any running program.
          setProgram("");
          // Swap the window content in place; layouts that can't (plain
          // text, planar) reload with the new source instead.
          if (!setWindowContent(v)) applySources({ content: v });
          break;
        default: extraState[key] = v; break;
      }
    }
  }

  function applySources(sources) {
    if (!sources) return;
    const q = new URLSearchParams(location.search);
    if (sources.video) q.set("video", sources.video);
    if (sources.word != null) { q.set("word", sources.word); q.delete("text"); }
    if (sources.content != null) {
      if (sources.content) q.set("content", sources.content); else q.delete("content");
    }
    location.search = q.toString(); // reloads with the new sources
  }

  function resurvey() {
    anchorLocked = false;
    haveAnchor = false;
    lastSampleT = -Infinity;
    surfGrid.fill(0);
  }

  if (hmChannel) {
    hmChannel.onmessage = function (event) {
      const msg = event.data;
      if (!msg) return;
      if (msg.type === "moonAudio") {
        // ~20 Hz level feed from the controller's audio deck analyser.
        feedAudio(msg.bass || 0, msg.mid || 0, msg.high || 0, msg.level || 0, !!msg.beat);
        return;
      }
      if (msg.type === "moonRequestState") { announce(); return; }
      if (msg.type === "moonConfig") {
        if (msg.set) applyLiveConfig(msg.set);
        if (msg.sources) { applySources(msg.sources); return; }
        if (msg.resurvey) resurvey();
        announce();
      }
    };
    // Announce on open, and again a few times in case the controller was
    // still binding its listener when the first message went out.
    announce();
    [300, 1200, 3000].forEach(function (ms) { setTimeout(announce, ms); });
    moon.video.addEventListener("playing", announce);
  }
})();
</script>
</body>
</html>
