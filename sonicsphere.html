        function startSceneExportRecording() {
            if (sceneRecorder && sceneRecorder.state === 'recording') {
                return false;
            }
            if (!renderer || !renderer.domElement || !renderer.domElement.captureStream) {
                console.error('Capture stream is not available in this browser.');
                return false;
            }
            sceneRecorderChunks = [];
            const captureStream = renderer.domElement.captureStream(30);
            const candidates = [
                'video/webm;codecs=vp9',
                'video/webm;codecs=vp8',
                'video/webm'
            ];
            sceneRecorderMimeType = '';
            for (const candidate of candidates) {
                if (window.MediaRecorder && MediaRecorder.isTypeSupported(candidate)) {
                    sceneRecorderMimeType = candidate;
                    break;
                }
            }
            sceneRecorder = sceneRecorderMimeType
                ? new MediaRecorder(captureStream, { mimeType: sceneRecorderMimeType })
                : new MediaRecorder(captureStream);
            sceneRecorder.ondataavailable = function(event) {
                if (event.data && event.data.size > 0) {
                    sceneRecorderChunks.push(event.data);
                }
            };
            sceneRecorder.start(250);
            console.log('Scene export recording started');
            return true;
        }

        function stopSceneExportRecording(filename = 'hypermuse-export.webm') {
            if (!sceneRecorder || sceneRecorder.state !== 'recording') {
                return Promise.resolve(false);
            }
            return new Promise(function(resolve) {
                sceneRecorder.onstop = function() {
                    const blobType = sceneRecorderMimeType || 'video/webm';
                    const blob = new Blob(sceneRecorderChunks, { type: blobType });
                    const url = URL.createObjectURL(blob);
                    const anchor = document.createElement('a');
                    anchor.href = url;
                    anchor.download = filename;
                    document.body.appendChild(anchor);
                    anchor.click();
                    document.body.removeChild(anchor);
                    URL.revokeObjectURL(url);
                    sceneRecorder = null;
                    sceneRecorderChunks = [];
                    resolve(true);
                };
                sceneRecorder.stop();
            });
        }

        function parsePhaseList(phaseListText, defaultDurationSec) {
            const raw = String(phaseListText || '')
                .split(',')
                .map(value => value.trim())
                .filter(Boolean);
            const seen = new Set();
            const plan = [];
            for (const phase of raw) {
                if (seen.has(phase)) {
                    continue;
                }
                seen.add(phase);
                plan.push({
                    name: phase,
                    durationSec: Math.max(1, defaultDurationSec)
                });
            }
            return plan;
        }

        function setEffectTimelineConfig(config = {}, restart = true) {
            if (typeof config.enabled === 'boolean') {
                effectTimelineEnabled = config.enabled;
            }

            if (Array.isArray(config.phases) && config.phases.length > 0) {
                const nextPlan = [];
                for (const phaseEntry of config.phases) {
                    if (typeof phaseEntry === 'string') {
                        nextPlan.push({ name: phaseEntry, durationSec: 16 });
                        continue;
                    }
                    if (!phaseEntry || !phaseEntry.name) {
                        continue;
                    }
                    const durationSec = Number.isFinite(phaseEntry.durationSec)
                        ? Math.max(1, phaseEntry.durationSec)
                        : 16;
                    nextPlan.push({
                        name: String(phaseEntry.name),
                        durationSec
                    });
                }
                if (nextPlan.length > 0) {
                    effectTimelinePlan = nextPlan;
                }
            } else if (typeof config.phaseList === 'string') {
                const defaultDurationSec = Number.isFinite(config.phaseDurationSec)
                    ? Math.max(1, config.phaseDurationSec)
                    : 16;
                const parsed = parsePhaseList(config.phaseList, defaultDurationSec);
                if (parsed.length > 0) {
                    effectTimelinePlan = parsed;
                }
            }

            if (restart) {
                effectTimelineStartMs = performance.now();
                lastAppliedEffectPhase = '';
            }
            updateEffectTimelineControls();
        }

            if (secInput) {

                    : 16;
                secInput.value = String(firstDuration);
            }

        function applyTimedEffects() {
            if (!effectTimelineEnabled || effectTimelineStartMs === null || effectTimelinePlan.length === 0) {
                return;
            }

            const elapsedSec = (performance.now() - effectTimelineStartMs) / 1000;
            let cycleSec = 0;
            for (const entry of effectTimelinePlan) {
                cycleSec += Math.max(1, entry.durationSec);
            }
            const t = elapsedSec % cycleSec;
            let cursor = 0;
            let phase = effectTimelinePlan[0].name;
            for (const entry of effectTimelinePlan) {
                const d = Math.max(1, entry.durationSec);
                if (t >= cursor && t < cursor + d) {
                    phase = entry.name;
                    break;
                }
                cursor += d;
            }

            if (phase !== lastAppliedEffectPhase) {
                applyEffectProfile(phase);
                lastAppliedEffectPhase = phase;
            }
        }

                                });
                            } else if (activeEffectProfile === 'stacked') {
                                material = new THREE.MeshBasicMaterial({
                                    color: color,
                                    opacity: 0.28,
                                    transparent: true,
                                    wireframe: false,
                                    side: THREE.DoubleSide
                                });
                            } else {
                                material = new THREE.MeshBasicMaterial({
                                    color: color,
                                    opacity: 0.55,
                                    transparent: true,
                                    side: THREE.DoubleSide
                                });
                            }
                            const triangle = new THREE.Mesh(geometry, material);
                            triangle.castShadow = true;
                            triangle.receiveShadow = true;
                            createdGeometry = geometry;
                            createdObject = triangle;
                        }

                        scene.add(createdObject); 
                        if (innerTriangleActive)
                        {
                            var innerGeometry = createInnerTriangleGeometry(lastPoints[0], lastPoints[1], lastPoints[2]);
                            var innerMaterial = new THREE.MeshBasicMaterial({color: "black", opacity: 0.5, transparent: false, side: THREE.DoubleSide});
                            var innerTriangle = new THREE.Mesh(innerGeometry, innerMaterial);
                            scene.add(innerTriangle); 

                        }

                        if (geometries.length > ACTIVE_GEOMETRIES_LIMIT) {

                                geometries[0].geometry.geometry.dispose();
                                geometries[0].geometry.material.dispose();
                                scene.remove(geometries[0].geometry);
                                geometries.shift();

                        }

                        geometries.push({geometry: createdObject, age: 0});
                        if (innerTriangleActive)
                        {
                            geometries.push({geometry: innerTriangle, age: 0});

                        }

                        lastPoints.shift();
                    }

                    lastPoints.push(points[i].position.clone());
                } else {
                    volumeDisplay.style.color = '#ff0000'; // red
                }
            }

            for (let i = geometries.length - 1; i >= 0; i--) {
                geometries[i].age++;
                if (geometries[i].age > 20) {
                    geometries[i].geometry.material.opacity -= 0.01;
                    if (geometries[i].geometry.material.opacity <= 0) {
                        scene.remove(geometries[i].geometry);
                        geometries.splice(i, 1);
                    }
                }
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            applyTimedEffects();

            // untoggle if to make fully deterministic
            hueoffset += hueOffsetSpeed;

            if(hueoffset > 360) {
                hueoffset -= 360;
            }



            scene.rotation.x += X_ROTATION_SPEED; 
            scene.rotation.y += Y_ROTATION_SPEED;

            renderer.render(scene, camera);
        }

        function ensureVisualizerLoopsRunning() {
            if (!animationStarted) {
                animationStarted = true;
                animate();
            }
            if (effectTimelineStartMs === null) {
                effectTimelineStartMs = performance.now();
            }
            if (captureInterval) {
                clearInterval(captureInterval);
            }
            captureInterval = setInterval(captureAudioData, CAPTURE_INTERVAL_MS);
        }

        let previousEnergies = []; // To store recent energy values
        let ENERGY_HISTORY = 10;  // How many past energy values to store
        let BEAT_THRESHOLD = 1.05; // To be adjusted
        let beatDataArray;
        let bufferLength;

        let audioContext;
        let biquadFilter;
        let startButton = document.getElementById('startButton');
        startButton.addEventListener('click', function() {
            startButton.parentElement.removeChild(startButton);

            navigator.mediaDevices.getUserMedia({ video: false, audio: true}).then(function(stream) {

            //NOTE: this helped with some pitch detection but had side effects

            // navigator.mediaDevices.getUserMedia({ video: false, audio: {
            // "mandatory": {
            //     "googEchoCancellation": "false",
            //     "googAutoGainControl": "false",
            //     "googNoiseSuppression": "false",
            //     "googHighpassFilter": "false"
            // }}}).then(function(stream) {
                
                audioContext = new AudioContext();
                let source = audioContext.createMediaStreamSource(stream);
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 2048 * 2;
                source.connect(analyser);

                //NOTE: not sure this is adding much value

                biquadFilter = audioContext.createBiquadFilter();
                biquadFilter.type = "lowpass";
                biquadFilter.frequency.setValueAtTime(150, audioContext.currentTime); // Keeping frequencies below 150Hz
                source.connect(biquadFilter);
                biquadFilter.connect(analyser);
                
                bufferLength = analyser.frequencyBinCount;
                beatDataArray = new Uint8Array(bufferLength);
                ensureVisualizerLoopsRunning();
                MAX_SIZE = Math.max(4,Math.floor(audioContext.sampleRate/5000));	// corresponds to a 5kHz signal
                // startPitchDetect();
                // updatePitch();

            });
        });

        
        let masterInput = document.getElementById('master');
        masterInput.value = startingVolumeThreshold;

        let thresholdsDiv = document.getElementById('thresholds');
        let startingVolumeThresholds = new Array(numBands).fill(startingVolumeThreshold);

        for(let i = 0; i < numBands; i++){
            let highEnd = 200; // maximum volume threshold for lowest frequency band
            let lowEnd = 10;   // minimum volume threshold for highest frequency band
            let range = highEnd - lowEnd;

            let input = document.createElement('input');
            input.type = 'range';
            input.min = '0';
            input.max = '255';
            input.value = startingVolumeThreshold;
            startingVolumeThresholds[i] = startingVolumeThreshold;
            thresholds[i] =  startingVolumeThreshold;

            // input.value = highEnd - Math.floor((i/numBands) * range);
            // startingVolumeThresholds[i] = highEnd - Math.floor((i/numBands) * range);
            input.id = 'threshold' + i;
            input.oninput = function(){
                thresholds[i] = this.value;  // Set the threshold for specific band
                // Add this line to update the display text when the threshold changesf
                // document.getElementById('volume' + i).textContent = 'v: ' + startingVolumeThresholds[i] + ' 0 / ' + startingVolumeThresholds[i];
                document.getElementById('volume' + i).textContent = ' 0 / ' + thresholds[i];

            };

            let volumeDisplay = document.createElement('span');
            volumeDisplay.id = 'volume' + i;
            volumeDisplay.style.color = 'white';
            volumeDisplay.textContent = "v: ";

            thresholdsDiv.appendChild(document.createTextNode('Band ' + i + ': '));
            thresholdsDiv.appendChild(input);
            thresholdsDiv.appendChild(volumeDisplay);
            thresholdsDiv.appendChild(document.createElement('br'));
            document.getElementById('volume' + i).textContent = 'v: 0 / ' + thresholds[i];
            document.getElementById('volume' + i).style = 'color:black';

        }

        let master = document.getElementById('master');
        let lastMasterValue = startingVolumeThreshold;
        master.oninput = function() {
            let masterValue = this.value;
            let delta = masterValue - lastMasterValue;
            // startingVolumeThresholds = startingVolumeThresholds.map(() => masterValue);  // Set all thresholds to the master's value

            for (let i = 0; i < numBands; i++) {
                let input = document.getElementById('threshold' + i);
                thresholds[i] =  parseInt(input.value) + delta;
                input.value = parseInt(input.value) + delta;
                document.getElementById('volume' + i).textContent = 'v: 0 / ' + input.value;
            }

            lastMasterValue = masterValue;
        };

        const audioQueue = [];
        let audioSource;  // Keep track of the current audio source

    document.getElementById('audioInput').addEventListener('change', async function(event) {

        audioContext = new AudioContext();
        if (audioContext.state === 'suspended') {
            await audioContext.resume();
        }
        analyser = audioContext.createAnalyser();
        analyser.fftSize = 2048 * 2 * 2;

        // Populate the audioQueue with the selected files
        audioQueue.length = 0;  // Clear the queue
        for (let file of event.target.files) {
            console.log(file);
            audioQueue.push(file);
        }

        playNext();
        ensureVisualizerLoopsRunning();
        MAX_SIZE = Math.max(4, Math.floor(audioContext.sampleRate / 5000));

    });
