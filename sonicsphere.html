            if (sceneRecorder && sceneRecorder.state === 'recording') {
                return false;
            }
            if (!renderer || !renderer.domElement || !renderer.domElement.captureStream) {
                console.error('Capture stream is not available in this browser.');
                return false;
            }
            sceneRecorderChunks = [];
            const captureStream = renderer.domElement.captureStream(30);
            const candidates = [
                'video/webm;codecs=vp9',
                'video/webm;codecs=vp8',
                'video/webm'
            ];
            sceneRecorderMimeType = '';
            for (const candidate of candidates) {
                if (window.MediaRecorder && MediaRecorder.isTypeSupported(candidate)) {
                    sceneRecorderMimeType = candidate;
                    break;
                }
            }
            sceneRecorder = sceneRecorderMimeType
                ? new MediaRecorder(captureStream, { mimeType: sceneRecorderMimeType })
                : new MediaRecorder(captureStream);
            sceneRecorder.ondataavailable = function(event) {
                if (event.data && event.data.size > 0) {
                    sceneRecorderChunks.push(event.data);
                }
            };
            sceneRecorder.start(250);
            console.log('Scene export recording started');
            return true;
        }

        function stopSceneExportRecording(filename = 'hypermuse-export.webm') {
            if (!sceneRecorder || sceneRecorder.state !== 'recording') {
                return Promise.resolve(false);
            }
            return new Promise(function(resolve) {
                sceneRecorder.onstop = function() {
                    const blobType = sceneRecorderMimeType || 'video/webm';
                    const blob = new Blob(sceneRecorderChunks, { type: blobType });
                    const url = URL.createObjectURL(blob);
                    const anchor = document.createElement('a');
                    anchor.href = url;
                    anchor.download = filename;
                    document.body.appendChild(anchor);
                    anchor.click();
                    document.body.removeChild(anchor);
                    URL.revokeObjectURL(url);
                    sceneRecorder = null;
                    sceneRecorderChunks = [];
                    resolve(true);
                };
                sceneRecorder.stop();
            });
        }

        function updateWordCloudOverlay(dt, audioFrame) {
            if (!wordCloudLayer) {
                return;
            }
            const enabled = activeEffectProfile === 'word-cloud';
            wordCloudLayer.style.display = enabled ? 'block' : 'none';
            if (!enabled || wordCloudItems.length === 0) {
                return;
            }
            const dts = Math.max(0.001, Math.min(0.05, Number(dt) || 0.016));
            const energy = audioFrame ? (audioFrame.energy || 0) : 0;
            const beatBoost = audioFrame && audioFrame.beat ? 0.22 : 0;
            const vw = Math.max(320, window.innerWidth);
            const vh = Math.max(220, window.innerHeight);
            for (let i = 0; i < wordCloudItems.length; i++) {
                const item = wordCloudItems[i];
                const speedScale = 1 + (energy * 0.9);
                item.x += item.vx * dts * speedScale;
                item.y += item.vy * dts * speedScale;
                const maxX = Math.max(8, vw - item.w - 8);
                const maxY = Math.max(8, vh - item.h - 8);
                if (item.x <= 0 || item.x >= maxX) {
                    item.vx *= -1;
                    item.x = Math.max(0, Math.min(maxX, item.x));
                }
                if (item.y <= 0 || item.y >= maxY) {
                    item.vy *= -1;
                    item.y = Math.max(0, Math.min(maxY, item.y));
                }
                const size = item.baseSize * (1 + (energy * 0.45) + beatBoost);
                item.el.style.fontSize = `${size.toFixed(1)}px`;
                item.el.style.opacity = `${Math.min(1, 0.62 + (energy * 0.7) + beatBoost)}`;
                item.el.style.transform = `translate(${item.x.toFixed(1)}px, ${item.y.toFixed(1)}px)`;
            }
        }

                blending: THREE.AdditiveBlending
            });
            moleculeInterBondLines = new THREE.LineSegments(interBondGeometry, moleculeInterBondMaterial);
            moleculeRenderGroup.add(moleculeInterBondLines);
            scene.add(moleculeRenderGroup);
        }

        function getElementColor(symbol) {
            const key = String(symbol || '').trim().toUpperCase();
            // Bright CPK-style palette tuned for stage visibility.
            const elementPalette = {
                H: 0xf6fbff,
                C: 0x8fa3b3,
                N: 0x5f8dff,
                O: 0xff4f5e,
                S: 0xffde5a,
                P: 0xffa54f,
                F: 0xa8ff8e,
                CL: 0x6ff06f,
                BR: 0xd58946,
                I: 0xa673ff,
                NA: 0x7ec1ff,
                K: 0xb88cff,
                CA: 0x90f0c8,
                MG: 0x8ef2cf,
                FE: 0xff9c72,
                ZN: 0x9ed5ff
            };
            return elementPalette[key] || elementPalette.C;
        }

        function setAtomVisual(mesh, symbol, atomSignal, beatBoost) {
            const atomColor = new THREE.Color(getElementColor(symbol));
            const luminanceBoost = Math.min(0.42, (atomSignal * 0.2) + (beatBoost * 1.1));
            atomColor.lerp(new THREE.Color(0xffffff), luminanceBoost);
            mesh.material.color.copy(atomColor);
        }

        function rebuildMoleculeBaseLayout(renderData) {
            const local = [];
            const atomCount = renderData.atoms.length;
            for (let i = 0; i < atomCount; i++) {
                const atom = renderData.atoms[i];
                const u = Number.isFinite(atom.baseU) ? atom.baseU : atom.u;
                const v = Number.isFinite(atom.baseV) ? atom.baseV : atom.v;
                const x = (u - 0.5) * 1.1;
                const y = (0.5 - v) * 1.1;
                const z = (Math.sin((i * 1.27) + 0.8) * 0.12);
                local.push(new THREE.Vector3(x, y, z));
            }
            const center = new THREE.Vector3();
            for (let i = 0; i < local.length; i++) {
                center.add(local[i]);
            }
            center.divideScalar(Math.max(1, local.length));
            for (let i = 0; i < local.length; i++) {
                local[i].sub(center).multiplyScalar(0.58);
            }
            moleculeBaseAtomPositions = local;
            moleculeLastAtomCount = atomCount;
        }

        function ensureMoleculeAtomMeshes(perMoleculeAtomCount, clusterCount) {
            const targetCount = Math.max(0, perMoleculeAtomCount * clusterCount);
            while (moleculeAtomMeshes.length < targetCount) {
                const mesh = new THREE.Mesh(moleculeAtomGeometry, moleculeAtomMaterial.clone());
                mesh.visible = false;
                moleculeRenderGroup.add(mesh);
                moleculeAtomMeshes.push(mesh);
            }
            for (let i = 0; i < moleculeAtomMeshes.length; i++) {
                moleculeAtomMeshes[i].visible = i < targetCount;
            }
        }

        function updateMoleculeOverlay(audioFrame) {
            if (!moleculeRenderGroup || !moleculeSimulationPlugin || !moleculeSimulationPlugin.getRenderData) {
                return;
            }
            const visible = activeEffectProfile === 'molecule'
                || activeEffectProfile === 'rewrite'
                || activeEffectProfile === 'stacked';
            moleculeRenderGroup.visible = visible;
            if (!visible) {
                return;
            }

            const renderData = moleculeSimulationPlugin.getRenderData();
            if (!renderData || !Array.isArray(renderData.atoms) || renderData.atoms.length === 0) {
                return;
            }

            const atomCount = renderData.atoms.length;
            if (moleculeLastAtomCount !== atomCount || moleculeBaseAtomPositions.length !== atomCount) {
                rebuildMoleculeBaseLayout(renderData);
            }

            const isRewriteMode = activeEffectProfile === 'rewrite' || moleculeRenderMode === 'rewrite';
            if (isRewriteMode && audioFrame && audioFrame.beat) {
                moleculeRewriteState = (moleculeRewriteState + 1) % 4;
            }
            const clusterCount = isRewriteMode
                ? 6
                : (activeEffectProfile === 'molecule' ? MOLECULE_CLUSTER_COUNT : Math.max(3, MOLECULE_CLUSTER_COUNT - 2));
            ensureMoleculeAtomMeshes(atomCount, clusterCount);

            const activeSignals = new Array(atomCount).fill(0);
            const low = audioFrame ? (audioFrame.low || 0) : 0;
            const mid = audioFrame ? (audioFrame.mid || 0) : 0;
            const high = audioFrame ? (audioFrame.high || 0) : 0;
            const beatBoost = audioFrame && audioFrame.beat ? 0.14 : 0;
            let totalSignal = 0;

            for (let i = 0; i < atomCount; i++) {
                const atom = renderData.atoms[i];
                const signal = Math.max(0, atom.signal || 0);
                activeSignals[i] = signal;
                totalSignal += signal;
            }
            const meanSignal = totalSignal / Math.max(1, atomCount);

            if (isRewriteMode) {
                const now = performance.now();
                const laneCenters = [-0.72, 0, 0.72]; // high, mid, low lanes left->right
                const laneEnergies = [high, mid, low];
                const chainsPerLane = 2;
                const chainSpread = 0.14;
                const atomWorldPositions = Array.from({ length: clusterCount }, () => new Array(atomCount));
                const clusterCenters = [];

                for (let lane = 0; lane < laneCenters.length; lane++) {
                    for (let chain = 0; chain < chainsPerLane; chain++) {
                        const clusterIndex = (lane * chainsPerLane) + chain;
                        const laneEnergy = laneEnergies[lane] || 0;
                        const lanePhase = (now * 0.0012 * (0.6 + laneEnergy)) + (chain * 1.7);
                        const center = new THREE.Vector3(
                            laneCenters[lane] + ((chain - 0.5) * chainSpread),
                            Math.sin(lanePhase) * (0.12 + (laneEnergy * 0.2)),
                            Math.cos(lanePhase * 0.7) * (0.08 + (laneEnergy * 0.16))
                        );
                        clusterCenters.push(center);
                        const rotation = (lanePhase * 0.8) + (moleculeRewriteState * 0.45);
                        const cosR = Math.cos(rotation);
                        const sinR = Math.sin(rotation);
                        const chainScale = 0.72 + (laneEnergy * 0.32) + beatBoost;

                        for (let atomIndex = 0; atomIndex < atomCount; atomIndex++) {
                            const meshIndex = (clusterIndex * atomCount) + atomIndex;
                            const mesh = moleculeAtomMeshes[meshIndex];
                            if (!mesh) continue;
                            const base = moleculeBaseAtomPositions[atomIndex] || new THREE.Vector3();
                            const rotatedX = (base.x * cosR) - (base.y * sinR);
                            const rotatedY = (base.x * sinR) + (base.y * cosR);
                            const wave = Math.sin((now * 0.0026) + (atomIndex * 0.35) + (lane * 0.9)) * (0.04 + (high * 0.08));
                            const targetPos = new THREE.Vector3(
                                center.x + (rotatedX * chainScale),
                                center.y + (rotatedY * chainScale) + wave,
                                center.z + (base.z * chainScale)
                            );
                            mesh.position.lerp(targetPos, 0.48);
                            atomWorldPositions[clusterIndex][atomIndex] = mesh.position.clone();

                            const atomSignal = activeSignals[atomIndex] || 0;
                            const atomSize = 0.055 + (atomSignal * 0.09) + beatBoost + (laneEnergy * 0.04);
                            mesh.scale.set(atomSize, atomSize, atomSize);
                            mesh.material.opacity = Math.min(1, 0.52 + (atomSignal * 0.42) + beatBoost + (laneEnergy * 0.12));
                            setAtomVisual(mesh, renderData.atoms[atomIndex].symbol, atomSignal + (laneEnergy * 0.2), beatBoost);
                        }
                    }
                }

                const bondPairs = [];
                if (moleculeRewriteState === 0 && Array.isArray(renderData.bonds)) {
                    for (let i = 0; i < renderData.bonds.length; i++) {
                        const bond = renderData.bonds[i];
                        bondPairs.push([bond.a, bond.b]);
                    }
                } else if (moleculeRewriteState === 1) {
                    for (let i = 0; i < atomCount; i++) {
                        bondPairs.push([i, (i + 1) % atomCount]);
                    }
                } else if (moleculeRewriteState === 2) {
                    for (let i = 0; i < atomCount; i += 2) {
                        bondPairs.push([i, (i + 2) % atomCount]);
                    }
                } else {
                    for (let i = 0; i < atomCount; i++) {
                        bondPairs.push([i, (atomCount - 1 - i)]);
                    }
                }

                const bondPositions = [];
                for (let clusterIndex = 0; clusterIndex < clusterCount; clusterIndex++) {
                    const clusterAtoms = atomWorldPositions[clusterIndex];
                    for (let i = 0; i < bondPairs.length; i++) {
                        const a = bondPairs[i][0];
                        const b = bondPairs[i][1];
                        if (!clusterAtoms[a] || !clusterAtoms[b]) continue;
                        const signal = Math.max(activeSignals[a] || 0, activeSignals[b] || 0);
                        if (signal < 0.02 && Math.random() > 0.2) continue;
                        bondPositions.push(
                            clusterAtoms[a].x, clusterAtoms[a].y, clusterAtoms[a].z,
                            clusterAtoms[b].x, clusterAtoms[b].y, clusterAtoms[b].z
                        );
                    }
                }
                moleculeBondLines.geometry.setAttribute(
                    'position',
                    new THREE.Float32BufferAttribute(bondPositions, 3)
                );
                moleculeBondLines.geometry.computeBoundingSphere();

                const interBondPositions = [];
                for (let lane = 0; lane < laneCenters.length; lane++) {
                    const base = lane * chainsPerLane;
                    const a = clusterCenters[base];
                    const b = clusterCenters[base + 1];
                    if (a && b) {
                        interBondPositions.push(a.x, a.y, a.z, b.x, b.y, b.z);
                    }
                    if (lane < laneCenters.length - 1) {
                        const c = clusterCenters[base + 1];
                        const d = clusterCenters[(lane + 1) * chainsPerLane];
                        if (c && d) {
                            interBondPositions.push(c.x, c.y, c.z, d.x, d.y, d.z);
                        }
                    }
                }
                moleculeInterBondLines.geometry.setAttribute(
                    'position',
                    new THREE.Float32BufferAttribute(interBondPositions, 3)
                );
                moleculeInterBondLines.geometry.computeBoundingSphere();

                moleculeBondMaterial.opacity = Math.min(1, 0.58 + (meanSignal * 0.36) + (high * 0.2) + beatBoost);
                moleculeInterBondMaterial.opacity = Math.min(1, 0.44 + (mid * 0.32) + beatBoost);
                moleculeRenderGroup.rotation.y += 0.0005 + (mid * 0.0026);
                moleculeRenderGroup.rotation.x = Math.sin(now / 1700) * 0.09;
                moleculeRenderGroup.rotation.z = Math.cos(now / 1300) * 0.06;
                return;
            }

            if (moleculeRenderMode === 'coherent') {
                const nowMs = performance.now();
                const atomWorldPositions = new Array(atomCount);
                const fixedScale = 1.05;
                for (let atomIndex = 0; atomIndex < atomCount; atomIndex++) {
                    const mesh = moleculeAtomMeshes[atomIndex];
                    if (!mesh) continue;
                    const base = moleculeBaseAtomPositions[atomIndex] || new THREE.Vector3();
                    const atomSignal = activeSignals[atomIndex] || 0;
                    const targetPos = base.clone().multiplyScalar(fixedScale);
                    targetPos.z += Math.sin((nowMs * 0.001) + (atomIndex * 0.32)) * (0.01 + (atomSignal * 0.012));
                    mesh.position.lerp(targetPos, 0.35);
                    atomWorldPositions[atomIndex] = mesh.position.clone();
                    const atomSize = 0.075 + (atomSignal * 0.06) + beatBoost;
                    mesh.scale.set(atomSize, atomSize, atomSize);
                    mesh.material.opacity = Math.min(1, 0.62 + (atomSignal * 0.32) + beatBoost);
                    setAtomVisual(mesh, renderData.atoms[atomIndex].symbol, atomSignal, beatBoost);
                }

                const bondPositions = [];
                if (Array.isArray(renderData.bonds)) {
                    for (let i = 0; i < renderData.bonds.length; i++) {
                        const bond = renderData.bonds[i];
                        const signal = Math.max(activeSignals[bond.a] || 0, activeSignals[bond.b] || 0);
                        if (!atomWorldPositions[bond.a] || !atomWorldPositions[bond.b]) {
                            continue;
                        }
                        bondPositions.push(
                            atomWorldPositions[bond.a].x, atomWorldPositions[bond.a].y, atomWorldPositions[bond.a].z,
                            atomWorldPositions[bond.b].x, atomWorldPositions[bond.b].y, atomWorldPositions[bond.b].z
                        );
                    }
                }
                moleculeBondLines.geometry.setAttribute(
                    'position',
                    new THREE.Float32BufferAttribute(bondPositions, 3)
                );
                moleculeBondLines.geometry.computeBoundingSphere();
                moleculeInterBondLines.geometry.setAttribute(
                    'position',
                    new THREE.Float32BufferAttribute([], 3)
                );
                moleculeInterBondLines.geometry.computeBoundingSphere();

                moleculeBondMaterial.opacity = Math.min(1, 0.7 + (meanSignal * 0.22) + (low * 0.15) + beatBoost);
                moleculeInterBondMaterial.opacity = 0;
                moleculeRenderGroup.rotation.y += 0.00035 + (mid * 0.0012);
                moleculeRenderGroup.rotation.x = Math.sin(nowMs / 4200) * 0.028;
                moleculeRenderGroup.rotation.z = Math.cos(nowMs / 5100) * 0.02;
                return;
            }

            const now = performance.now();
            const ringRadius = (activeEffectProfile === 'molecule' ? 0.58 : 0.46) + (low * 0.08);
            const moleculeScale = 0.95 + (mid * 0.22) + beatBoost;
            const clusterCenters = [];
            const atomWorldPositions = Array.from({ length: clusterCount }, () => new Array(atomCount));

            for (let clusterIndex = 0; clusterIndex < clusterCount; clusterIndex++) {
                const phase = (now * 0.00034) + ((clusterIndex / clusterCount) * Math.PI * 2);
                const sampledSignal = activeSignals[clusterIndex % atomCount] || meanSignal;
                const localRadius = ringRadius + (sampledSignal * 0.11);
                const center = new THREE.Vector3(
                    Math.cos(phase) * localRadius,
                    (Math.sin((phase * 1.2) + 0.4) * 0.15) + (sampledSignal * 0.08),
                    Math.sin(phase) * 0.22
                );
                clusterCenters.push(center);

                const rotation = phase + (sampledSignal * 0.7);
                const cosR = Math.cos(rotation);
                const sinR = Math.sin(rotation);
                for (let atomIndex = 0; atomIndex < atomCount; atomIndex++) {
                    const meshIndex = (clusterIndex * atomCount) + atomIndex;
                    const mesh = moleculeAtomMeshes[meshIndex];
                    if (!mesh) continue;
                    const base = moleculeBaseAtomPositions[atomIndex] || new THREE.Vector3();
                    const rotatedX = (base.x * cosR) - (base.y * sinR);
                    const rotatedY = (base.x * sinR) + (base.y * cosR);
                    const rotatedZ = base.z;
                    const targetPos = new THREE.Vector3(
                        center.x + (rotatedX * moleculeScale),
                        center.y + (rotatedY * moleculeScale),
                        center.z + (rotatedZ * moleculeScale)
                    );
                    mesh.position.lerp(targetPos, 0.45);
                    atomWorldPositions[clusterIndex][atomIndex] = mesh.position.clone();
                    const atomSignal = activeSignals[atomIndex] || 0;
                    const atomSize = 0.07 + (atomSignal * 0.1) + beatBoost;
                    mesh.scale.set(atomSize, atomSize, atomSize);
                    mesh.material.opacity = Math.min(1, 0.5 + (atomSignal * 0.42) + beatBoost);
                    setAtomVisual(mesh, renderData.atoms[atomIndex].symbol, atomSignal, beatBoost);
                }
            }

            const bondPositions = [];
            if (Array.isArray(renderData.bonds)) {
                for (let clusterIndex = 0; clusterIndex < clusterCount; clusterIndex++) {
                    const clusterAtoms = atomWorldPositions[clusterIndex];
                    for (let i = 0; i < renderData.bonds.length; i++) {
                        const bond = renderData.bonds[i];
                        const signal = Math.max(activeSignals[bond.a] || 0, activeSignals[bond.b] || 0);
                        if (signal < 0.02 || !clusterAtoms[bond.a] || !clusterAtoms[bond.b]) {
                            continue;
                        }
                        bondPositions.push(
                            clusterAtoms[bond.a].x, clusterAtoms[bond.a].y, clusterAtoms[bond.a].z,
                            clusterAtoms[bond.b].x, clusterAtoms[bond.b].y, clusterAtoms[bond.b].z
                        );
                    }
                }
            }

            moleculeBondLines.geometry.setAttribute(
                'position',
                new THREE.Float32BufferAttribute(bondPositions, 3)
            );
            moleculeBondLines.geometry.computeBoundingSphere();

            const interBondPositions = [];
            for (let i = 0; i < clusterCenters.length; i++) {
                const current = clusterCenters[i];
                const next = clusterCenters[(i + 1) % clusterCenters.length];
                interBondPositions.push(
                    current.x, current.y, current.z,
                    next.x, next.y, next.z
                );
            }
            moleculeInterBondLines.geometry.setAttribute(
                'position',
                new THREE.Float32BufferAttribute(interBondPositions, 3)
            );
            moleculeInterBondLines.geometry.computeBoundingSphere();

            moleculeBondMaterial.opacity = Math.min(1, 0.62 + (meanSignal * 0.3) + (low * 0.2) + beatBoost);
            moleculeInterBondMaterial.opacity = Math.min(1, 0.46 + (mid * 0.35) + beatBoost);
            moleculeRenderGroup.rotation.z += 0.0012 + (high * 0.01);
            moleculeRenderGroup.rotation.y = Math.sin((performance.now() / 1200)) * 0.12;
        }

        function initEffectOverlay() {

            effectOverlayElement.id = 'effectOverlay';
            effectOverlayElement.style.position = 'fixed';
            effectOverlayElement.style.left = '50%';

            effectOverlayElement.style.letterSpacing = '0.4px';

            effectOverlayElement.style.display = (demoMode && !hideDemoFxOverlay) ? 'block' : 'none';
            const phase = String(activeEffectProfile || 'classic').toUpperCase();
            let details = `Effect: ${phase} | Lanes: HIGH MID LOW`;
            if (basicVideoModeEnabled) {
                details = `Effect: BASIC VIDEO | Videos-only (B)`;
            }
            if (activeEffectProfile === 'classic') {
                const currentLoopLabel = window.__hypermuseCurrentLoopLabel
                    ? String(window.__hypermuseCurrentLoopLabel).trim()
                    : '';

                    details += ` | Loop: ${currentLoopLabel}`;
                }
            }
            if (activeEffectProfile === 'gray-scott') {
                details += ` | GS Preset: ${String(grayScottPresetName || 'nexus').toUpperCase()}`;
            }
            details += ` | BG: ${String(backgroundScriptId || 'none').toUpperCase()}`;
            details += ` | P5: ${backdropOriginalFidelity ? 'ORIGINAL' : 'STYLIZED'} (O)`;
            if (fullScreenVideoBgEnabled) {

            }

                details += ` | FIBONACCI MOSAIC`;
            }

                details += ` | INFSTREAM EMBED`;
            }
            details += ` | Layout: ${effectLayoutMode === 'thirds-2d' ? 'THIRDS-2D' : 'SPHERES'}`;
            if ((activeEffectProfile === 'molecule' || activeEffectProfile === 'rewrite' || activeEffectProfile === 'stacked') && moleculeSimulationPlugin && moleculeSimulationPlugin.getSummary) {
                const summary = moleculeSimulationPlugin.getSummary();
                if (summary && summary.label) {
                    details += ` | Molecule: ${summary.label}`;

            }
            if (activeEffectProfile === 'word-cloud') {
                details += ` | List: ${activeWordCloudListName} | Phrases: ${wordCloudPhrases.length}`;
            }
            effectOverlayElement.textContent = details;
        }

            initSimulationBackdrop();

            const shellGeometry = new THREE.SphereGeometry(1.07, 48, 48);

            });

            });

            kuramotoSideSphere.visible = false;

            moleculeSideSphere.visible = false;

            const thirdPanelGeometry = new THREE.PlaneGeometry(0.98, 1.7);
            const thirdPanelX = [-1.07, 0, 1.07];
            const thirdPanelColors = [0x8df7c8, 0xb8f8ff, 0xd5ffe8];
            effectThirdPanels = [];
            for (let i = 0; i < thirdPanelX.length; i++) {
                const panel = new THREE.Mesh(
                    thirdPanelGeometry,

        function updateVideoBackdropFit() {
            if (!videoBackdropQuad) {
                return;
            }
            const sourceVideo = document.getElementById('videoElement');
            if (!sourceVideo) {
                return;
            }
            const vw = Math.max(1, sourceVideo.videoWidth || sourceVideo.clientWidth || 1);
            const vh = Math.max(1, sourceVideo.videoHeight || sourceVideo.clientHeight || 1);
            const viewportWidth = demoMode ? window.innerWidth : Math.max(1, container.clientWidth || window.innerWidth || 1);
            const viewportHeight = demoMode ? window.innerHeight : Math.max(1, container.clientHeight || window.innerHeight || 1);
            const videoAspect = vw / vh;
            const viewportAspect = viewportWidth / viewportHeight;
            if (videoBackdropFitMode === 'contain') {
                if (videoAspect > viewportAspect) {
                    videoBackdropQuad.scale.set(1, viewportAspect / videoAspect, 1);
                } else {
                    videoBackdropQuad.scale.set(videoAspect / viewportAspect, 1, 1);
                }
            } else {
                if (videoAspect > viewportAspect) {
                    videoBackdropQuad.scale.set(videoAspect / viewportAspect, 1, 1);
                } else {
                    videoBackdropQuad.scale.set(1, viewportAspect / videoAspect, 1);
                }
            }
            if (videoBackdropTexture) {
                const crop = videoBackdropCrop;
                if (crop && Number.isFinite(crop.x) && Number.isFinite(crop.y) && Number.isFinite(crop.width) && Number.isFinite(crop.height)) {
                    const width = Math.max(0.2, Math.min(1, crop.width));
                    const height = Math.max(0.2, Math.min(1, crop.height));
                    const maxX = Math.max(0, 1 - width);
                    const maxY = Math.max(0, 1 - height);
                    const x = Math.max(0, Math.min(maxX, crop.x));
                    const y = Math.max(0, Math.min(maxY, crop.y));
                    videoBackdropTexture.repeat.set(width, height);
                    videoBackdropTexture.offset.set(x, y);
                } else {
                    videoBackdropTexture.repeat.set(1, 1);
                    videoBackdropTexture.offset.set(0, 0);
                }
                videoBackdropTexture.needsUpdate = true;
            }
        }

        function getFibonacciRects(count = 8) {
            let x = 0;
            let y = 0;
            let w = 1;
            let h = 1;
            let horizontal = true;
            const phi = 0.61803398875;
            const rects = [];
            for (let i = 0; i < count; i++) {
                if (horizontal) {
                    const cut = w * phi;
                    rects.push({ x, y, w: cut, h });
                    x += cut;
                    w -= cut;
                } else {
                    const cut = h * phi;
                    rects.push({ x, y, w, h: cut });
                    y += cut;
                    h -= cut;
                }
                horizontal = !horizontal;
                if (w < 0.08 || h < 0.08) break;
            }
            rects.push({ x, y, w: Math.max(0.08, w), h: Math.max(0.08, h) });
            return rects.slice(0, count);
        }

            if (useFxTile) {
                const modeList = getMosaicFxModes();
                const mode = modeList[fibonacciMosaicFxIndex % modeList.length];
                fibonacciMosaicFxIndex += 1;
                const iframe = document.createElement('iframe');
                iframe.setAttribute('title', `Mosaic FX ${mode}`);

                iframe.style.width = '100%';

                tile.appendChild(iframe);
                return { tile, iframe, isFx: true, mode };

            video.addEventListener('canplay', tryPlay, { once: true });
            tryPlay();
            return { tile, video, isFx: false };
        }

        function rebuildFibonacciMosaicTiles() {
            ensureFibonacciMosaicLayer();
            if (!fibonacciMosaicLayer) return;
            fibonacciMosaicLayer.innerHTML = '';
            fibonacciMosaicTiles = [];
            const sources = getMosaicSources();
            if (sources.length === 0) return;
            const rects = getFibonacciRects(8);
            for (let i = 0; i < rects.length; i++) {
                const src = sources[i % sources.length];
                fibonacciMosaicTiles.push(createMosaicTile(rects[i], src, i));

            if (!simulationShell) {

            const thirdsLayout = effectLayoutMode === 'thirds-2d';
            const isClassic = activeEffectProfile === 'classic';
            const isLife = activeEffectProfile === 'life';

            if (!moleculeSimulationPlugin) {

            if (!moleculeName) {
                return;

            moleculeLoadInFlight = true;
            try {

                setMoleculeStatus(`${result.name}: ${result.atomCount} atoms / ${result.bondCount} bonds`);

            } catch (error) {

            moleculeSequence = names

                .filter(Boolean);
            moleculeCycleOnPhaseChange = !!options.cycleOnPhaseChange;
            moleculeSequenceIndex = -1;
            if (moleculeSequence.length > 0) {
                const startIndex = Number.isFinite(options.startIndex)
                    ? Math.max(0, Math.min(moleculeSequence.length - 1, options.startIndex))
                    : 0;
                moleculeSequenceIndex = startIndex;
                loadMoleculeByName(moleculeSequence[moleculeSequenceIndex]);
            }
        }

            if (moleculeSequence.length === 0) {

        function blendColor(a, b, t) {
            const clamped = Math.max(0, Math.min(1, Number(t) || 0));
            return [
                Math.round((a[0] * (1 - clamped)) + (b[0] * clamped)),
                Math.round((a[1] * (1 - clamped)) + (b[1] * clamped)),
                Math.round((a[2] * (1 - clamped)) + (b[2] * clamped))
            ];
        }

        function samplePalette(palette, phase01) {
            if (!Array.isArray(palette) || palette.length === 0) {
                return [220, 255, 240];
            }
            if (palette.length === 1) {
                return palette[0].slice();
            }
            const wrapped = ((Number(phase01) || 0) % 1 + 1) % 1;
            const scaled = wrapped * palette.length;
            const i0 = Math.floor(scaled) % palette.length;
            const i1 = (i0 + 1) % palette.length;
            const localT = scaled - Math.floor(scaled);
            return blendColor(palette[i0], palette[i1], localT);
        }

        function parsePhaseList(phaseListText, defaultDurationSec) {
            const raw = String(phaseListText || '')
                .split(',')
                .map(value => value.trim())
                .filter(Boolean);
            const plan = [];
            for (const phase of raw) {
                const normalizedName = normalizeEffectProfileName(phase);
                plan.push({
                    name: normalizedName,
                    durationSec: Math.max(1, defaultDurationSec)
                });
            }
            return plan;
        }

        function enforceClassicBetweenEffects(plan = []) {
            if (!Array.isArray(plan) || plan.length === 0) {
                return [];
            }
            let classicDurationSec = 16;
            for (const entry of plan) {
                if (String(entry.name || '').trim().toLowerCase() === 'classic') {
                    classicDurationSec = Math.max(1, Number(entry.durationSec) || classicDurationSec);
                    break;
                }
            }
            const expanded = [];
            for (let i = 0; i < plan.length; i++) {
                const current = plan[i];
                const next = plan[i + 1];
                const currentName = String(current.name || '').trim();
                if (!currentName) {
                    continue;
                }
                expanded.push({
                    name: currentName,
                    durationSec: Math.max(1, Number(current.durationSec) || 16)
                });
                if (!next) {
                    continue;
                }
                const nextName = String(next.name || '').trim();
                if (!nextName) {
                    continue;
                }
                const currentIsClassic = currentName.toLowerCase() === 'classic';
                const nextIsClassic = nextName.toLowerCase() === 'classic';
                if (!currentIsClassic && !nextIsClassic) {
                    expanded.push({
                        name: 'classic',
                        durationSec: classicDurationSec
                    });
                }
            }
            return expanded;
        }

        function setEffectTimelineConfig(config = {}, restart = true) {
            if (typeof config.enabled === 'boolean') {
                effectTimelineEnabled = config.enabled;
            }

            if (Array.isArray(config.phases) && config.phases.length > 0) {
                const nextPlan = [];
                for (const phaseEntry of config.phases) {
                    if (typeof phaseEntry === 'string') {
                        nextPlan.push({ name: phaseEntry, durationSec: 16 });
                        continue;
                    }
                    if (!phaseEntry || !phaseEntry.name) {
                        continue;
                    }
                    const durationSec = Number.isFinite(phaseEntry.durationSec)
                        ? Math.max(1, phaseEntry.durationSec)
                        : 16;
                    const normalizedName = normalizeEffectProfileName(phaseEntry.name);
                    nextPlan.push({
                        name: normalizedName,
                        durationSec
                    });
                }
                if (nextPlan.length > 0) {
                    effectTimelinePlan = enforceClassicBetweenEffects(nextPlan);
                }
            } else if (typeof config.phaseList === 'string') {
                const defaultDurationSec = Number.isFinite(config.phaseDurationSec)
                    ? Math.max(1, config.phaseDurationSec)
                    : 16;
                const parsed = parsePhaseList(config.phaseList, defaultDurationSec);
                if (parsed.length > 0) {
                    effectTimelinePlan = enforceClassicBetweenEffects(parsed);
                }
            }

            if (restart) {
                effectTimelineStartMs = performance.now();
                lastAppliedEffectPhase = '';
            }
            updateEffectTimelineControls();
        }

        function updateEffectTimelineControls() {

            if (enabledInput) {

        function applyTimedEffects() {
            if (basicVideoModeEnabled || !effectTimelineEnabled || effectTimelineStartMs === null || effectTimelinePlan.length === 0) {
                return;
            }

            const elapsedSec = (performance.now() - effectTimelineStartMs) / 1000;
            let cycleSec = 0;
            const validPlan = [];
            for (const entry of effectTimelinePlan) {
                const name = normalizeEffectProfileName(entry && entry.name);
                const durationSec = Number.isFinite(entry && entry.durationSec)
                    ? Math.max(1, entry.durationSec)
                    : 1;
                validPlan.push({ name, durationSec });
                cycleSec += durationSec;
            }
            if (cycleSec <= 0 || validPlan.length === 0) {
                return;
            }
            const t = elapsedSec % cycleSec;
            let cursor = 0;
            let phase = validPlan[0].name;
            for (const entry of validPlan) {
                const d = entry.durationSec;
                if (t >= cursor && t < cursor + d) {
                    phase = entry.name;
                    break;
                }
                cursor += d;
            }

            if (phase !== lastAppliedEffectPhase) {
                applyEffectProfile(phase);
                lastAppliedEffectPhase = phase;
                if (moleculeCycleOnPhaseChange && moleculeSequence.length > 0) {
                    advanceMoleculeSequence().catch((error) => console.error(error));
                }
                if (backgroundCycleOnPhaseChange) {
                    advanceBackgroundScriptSequence();
                }
            }
        }

        function getLaneKeyForBandIndex(bandIndex) {
            if (bandIndex >= midBandCutoff) {

            if (bandIndex >= lowBandCutoff) {

            return 'low';

        // Build three lane spheres in spatial order:
        // left = HIGH, middle = MID, right = LOW.
        function initBands(){
            lowBandCutoff = Math.max(1, Math.floor(numBands / 3));
            midBandCutoff = Math.max(lowBandCutoff + 1, Math.floor((numBands * 2) / 3));
            midBandCutoff = Math.min(numBands - 1, midBandCutoff);
            bandPoints = new Array(numBands);
            laneLastPoints.high = [];
            laneLastPoints.mid = [];
            laneLastPoints.low = [];

            for (const sphere of laneBaseSpheres) {
                scene.remove(sphere);
                if (sphere.geometry) sphere.geometry.dispose();
                if (sphere.material) sphere.material.dispose();
            }
            laneBaseSpheres = [];

            function buildLanePoints(indices, centerX) {
                const goldenRatio = (1 + Math.sqrt(5)) / 2;
                const angleIncrement = Math.PI * 2 * goldenRatio;
                const count = Math.max(1, indices.length);
                for (let localIndex = 0; localIndex < indices.length; localIndex++) {
                    const bandIndex = indices[localIndex];
                    const v = localIndex / count;
                    const phi = v * Math.PI;
                    const theta = angleIncrement * localIndex;
                    const x = centerX + (LANE_RADIUS * Math.sin(phi) * Math.cos(theta));
                    const y = LANE_RADIUS * Math.sin(phi) * Math.sin(theta);
                    const z = LANE_RADIUS * Math.cos(phi);

                    const point = new THREE.Points(
                        new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0, 0, 0)]),
                        new THREE.PointsMaterial({ color: 0xffffff, size: 0.01 })
                    );
                    point.position.set(
                        isNaN(x) ? centerX : x,
                        isNaN(y) ? 0 : y,
                        isNaN(z) ? 0 : z
                    );
                    bandPoints[bandIndex] = point;
                }
            }

            const lowIndices = [];
            const midIndices = [];
            const highIndices = [];
            for (let i = 0; i < numBands; i++) {
                const laneKey = getLaneKeyForBandIndex(i);
                if (laneKey === 'high') {
                    highIndices.push(i);
                } else if (laneKey === 'mid') {
                    midIndices.push(i);
                } else {
                    lowIndices.push(i);
                }
            }

            buildLanePoints(highIndices, HIGH_LANE_CENTER_X);
            buildLanePoints(midIndices, MID_LANE_CENTER_X);
            buildLanePoints(lowIndices, LOW_LANE_CENTER_X);

            const highShell = new THREE.Mesh(
                new THREE.SphereGeometry(LANE_RADIUS * 1.02, 22, 22),
                new THREE.MeshBasicMaterial({
                    color: 0x9affcc,
                    wireframe: true,
                    transparent: true,
                    opacity: 0.12
                })
            );
            highShell.position.set(HIGH_LANE_CENTER_X, 0, 0);

            const midShell = new THREE.Mesh(
                new THREE.SphereGeometry(LANE_RADIUS * 1.02, 22, 22),
                new THREE.MeshBasicMaterial({
                    color: 0xb8ffe0,
                    wireframe: true,
                    transparent: true,
                    opacity: 0.11
                })
            );
            midShell.position.set(MID_LANE_CENTER_X, 0, 0);

            const lowShell = new THREE.Mesh(
                new THREE.SphereGeometry(LANE_RADIUS * 1.02, 22, 22),
                new THREE.MeshBasicMaterial({
                    color: 0x86f7b7,
                    wireframe: true,
                    transparent: true,
                    opacity: 0.12
                })
            );
            lowShell.position.set(LOW_LANE_CENTER_X, 0, 0);

            laneBaseSpheres.push(highShell, midShell, lowShell);
            scene.add(highShell);
            scene.add(midShell);
            scene.add(lowShell);
        }

        function captureAudioData() {


            let data = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteFrequencyData(data);
            const nowMs = performance.now();
            let totalEnergy = 0;
            for (let i = 0; i < data.length; i++) {
                totalEnergy += data[i];
            }
            const inWarmup = nowMs < visualWarmupUntilMs;

            // Startup fallback so first seconds are visibly active before decoded audio bins ramp up.
            if (inWarmup && totalEnergy < 64) {
                for (let i = 0; i < data.length; i++) {
                    const osc1 = Math.sin((i * 0.085) + (nowMs / 240));
                    const osc2 = Math.sin((i * 0.018) + (nowMs / 510));
                    const v = 58 + (osc1 * 52) + (osc2 * 34);
                    data[i] = Math.max(0, Math.min(255, Math.floor(v)));
                }
            }
            if (layeredAudioEngine) {
                layeredAudioEngine.setNumBands(numBands);
                const now = performance.now();
                const dt = Math.max(0.001, (now - lastSimulationTickMs) / 1000);
                lastSimulationTickMs = now;
                const audioFrame = layeredAudioEngine.update(data, audioContext);
                if (simCompositor) {
                    simCompositor.update(dt, audioFrame);
                }
                if (backgroundEngine) {
                    backgroundEngine.update(dt, audioFrame);
                }
                updateFibonacciMosaic(now);
                updateWordCloudOverlay(dt, audioFrame);
                if (simulationBackdropMaterial) {
                    simulationBackdropMaterial.opacity = Math.min(
                        0.75,
                        Math.max(0.03, (simulationBackdropBaseOpacity + (audioFrame.energy * 0.18)) * backdropOpacityMultiplier)
                    );
                }
                if (backgroundBackdropMaterial) {
                    const faintBase = 0.09 + (audioFrame.low * 0.16);
                    const faintScale = Math.max(0, Math.min(1.25, backdropOpacityMultiplier));
                    backgroundBackdropMaterial.opacity = Math.min(0.42, faintBase * faintScale);
                }
                updateMoleculeOverlay(audioFrame);
                maybeAdvanceMoleculeOnBeat(audioFrame, nowMs);
                updateDynamicEffectColors(audioFrame, nowMs);
                if (simulationShell) {
                    // Keep this as a subtle background sphere carrying simulation texture.
                    simulationShell.material.opacity = Math.min(0.28, (simulationShellBaseOpacity * 0.22) + (audioFrame.energy * 0.12));
                    simulationShell.rotation.y += 0.0015 + (audioFrame.mid * 0.01);
                    simulationShell.rotation.x += 0.0008 + (audioFrame.high * 0.004);
                }
                if (lifeSideSphere && lifeSideSphere.visible) {
                    lifeSideSphere.rotation.y += 0.001 + (audioFrame.low * 0.01);
                    lifeSideSphere.rotation.x += 0.0006 + (audioFrame.mid * 0.004);
                }
                if (kuramotoSideSphere && kuramotoSideSphere.visible) {
                    kuramotoSideSphere.rotation.y += 0.0018 + (audioFrame.mid * 0.016);
                    kuramotoSideSphere.rotation.z += 0.0007 + (audioFrame.high * 0.006);
                }
                if (moleculeSideSphere && moleculeSideSphere.visible) {

    function mapVjModeToEffect(mode) {
        const normalized = String(mode || '').trim().toLowerCase();
        if (normalized === 'morphospace') return 'molecule';
        if (normalized === 'darcy') return 'kuramoto';
        if (normalized === 'turing') return 'gray-scott';
        if (normalized === 'voltage') return 'physarum';
            if (normalized === 'hierarchical' || normalized === 'hierarchical-life' || normalized === 'hierlife') return 'hierarchical-life';
            if (normalized === 'rewrite' || normalized === 'chemlambda' || normalized === 'lambda') return 'rewrite';
        if (normalized === 'words' || normalized === 'wordcloud' || normalized === 'word-cloud') return 'word-cloud';
        return 'classic';
    }

    function getNextVjMode() {
        const sequence = ['morphospace', 'darcy', 'turing', 'voltage'];
        const current = activeEffectProfile;
        const reverseMap = {
            molecule: 'morphospace',
            kuramoto: 'darcy',
            'gray-scott': 'turing',
            physarum: 'voltage'
        };
        const currentMode = reverseMap[current] || 'morphospace';
        const idx = sequence.indexOf(currentMode);
        return sequence[(idx + 1) % sequence.length];
    }

        updateEffectOverlay();
        return {
            mode: activeEffectProfile,
            speed: vjSpeedMultiplier,
            hue: hueoffset,
            intensity: backdropOpacityMultiplier,
            paused: vjPaused,
            layout: effectLayoutMode,
            basicVideo: basicVideoModeEnabled,
            loopPreference: (typeof window.getCurrentLoopPreference === 'function')
                ? window.getCurrentLoopPreference()
                : 'neutral',
            wordList: activeWordCloudListName,
            infinitestreams: infinitestreamsEmbedEnabled,
            mosaic: fibonacciMosaicEnabled,
            mosaicFx: fibonacciMosaicFxEnabled
        };
    }

    window.vjControl = function(cmd = {}) {
        return applyVjCommand(cmd);
    };

    window.addEventListener('message', function(event) {
        if (!event || !event.data) {
            return;
        }
        if (event.data.type === 'vj') {
            applyVjCommand(event.data);
            return;
        }
        // Compatibility bridge for legacy controller name/value messages.
        if (event.data.name === 'bridgeFadeOutButton') {
            applyVjCommand({ type: 'vj', blackout: 1, blackoutFadeMs: 1400 });
            return;
        }
        if (event.data.name === 'bridgeFadeInButton') {
            applyVjCommand({ type: 'vj', blackout: 0, blackoutFadeMs: 1200 });
            return;
        }
        if (event.data.name === 'videochange' || event.data.name === 'videochangeloop') {
            if (typeof window.playNextSetEntry === 'function') {
                window.playNextSetEntry();
            }
        }
    });

    function announceVjReady() {
        const payload = { type: 'vj', event: 'ready', origin: location.origin };
        if (window.parent && window.parent !== window) {
            window.parent.postMessage(payload, '*');
        }
        if (window.opener) {
            window.opener.postMessage(payload, '*');
        }
    }

    function initVjWebSocket() {
        const params = new URLSearchParams(window.location.search);
        const wsUrl = params.get('ws');
        if (!wsUrl) {
            return;
        }
        let reconnectTimer = null;
        const connect = function() {
            if (vjWs && (vjWs.readyState === WebSocket.OPEN || vjWs.readyState === WebSocket.CONNECTING)) {
                return;
            }
            try {
                vjWs = new WebSocket(wsUrl);
            } catch {
                reconnectTimer = setTimeout(connect, 2000);
                return;
            }
            vjWs.addEventListener('open', function() {
                vjWs.send(JSON.stringify({ type: 'vj', event: 'hello' }));
            });
            vjWs.addEventListener('message', function(message) {
                try {
                    const payload = JSON.parse(message.data);
                    if (payload && payload.type === 'vj') {
                        applyVjCommand(payload);
                    }
                } catch {
                    // ignore malformed messages
                }
            });
            vjWs.addEventListener('close', function() {
                if (reconnectTimer) {
                    clearTimeout(reconnectTimer);
                }
                reconnectTimer = setTimeout(connect, 2000);
            });
        };
        connect();
    }

    function resolveRemoteVjCommand(payload, instanceId) {
        if (!payload || typeof payload !== 'object') {
            return null;
        }
        if (payload.type === 'vj') {
            return payload;
        }
        if (payload.command && typeof payload.command === 'object') {
            return payload.command;
        }
        if (payload.instances && typeof payload.instances === 'object') {
            const scoped = payload.instances[instanceId] || payload.instances.default;
            if (scoped && typeof scoped === 'object') {
                return scoped;
            }
        }
        if (Array.isArray(payload.commands) && payload.commands.length > 0) {
            const candidate = payload.commands.find((entry) => {
                if (!entry || typeof entry !== 'object') return false;
                if (!entry.instance && !entry.instanceId) return true;
                return String(entry.instance || entry.instanceId) === instanceId;
            });
            if (candidate && typeof candidate.command === 'object') {
                return candidate.command;
            }
        }
        return null;
    }

    function initVjRemotePolling(params) {
        const remoteUrl = params.get('remoteConfig') || params.get('remote');
        if (!remoteUrl) {
            return;
        }
        const instanceId = params.get('instance') || params.get('instanceId') || `hypermuse-${location.hostname}`;
        const requestedMs = Number(params.get('remotePollMs'));
        const pollMs = Number.isFinite(requestedMs) ? Math.max(500, requestedMs) : 1500;

        const pollOnce = async function() {
            if (vjRemotePollInFlight) {
                return;
            }
            vjRemotePollInFlight = true;
            try {
                const url = new URL(remoteUrl, window.location.href);
                url.searchParams.set('instance', instanceId);
                url.searchParams.set('ts', String(Date.now()));
                const response = await fetch(url.toString(), { cache: 'no-store' });
                if (!response.ok) {
                    return;
                }
                const payload = await response.json();
                const command = resolveRemoteVjCommand(payload, instanceId);
                if (!command) {
                    return;
                }
                const fingerprint = String(
                    payload.revision
                    || payload.version
                    || command.revision
                    || JSON.stringify(command)
                );
                if (fingerprint === vjRemoteLastFingerprint) {
                    return;
                }
                vjRemoteLastFingerprint = fingerprint;
                applyVjCommand(command);
            } catch {
                // Ignore transient remote errors and continue polling.
            } finally {
                vjRemotePollInFlight = false;
            }
        };

        pollOnce();
        if (vjRemotePollTimer) {
            clearInterval(vjRemotePollTimer);
        }
        vjRemotePollTimer = setInterval(pollOnce, pollMs);
    }

    const vjBootParams = new URLSearchParams(window.location.search);
    if (vjBootParams.get('hideui') === '1' || vjBootParams.get('clean') === '1') {
        setUiHidden(true);
    }
    const bootMode = vjBootParams.get('mode');
    const bootSetManifest = vjBootParams.get('set') || vjBootParams.get('setmanifest');
    const bootSpeed = Number(vjBootParams.get('speed'));
    const bootHue = Number(vjBootParams.get('hue'));
    const bootIntensity = Number(vjBootParams.get('intensity'));
    const bootPaused = vjBootParams.get('paused');
    const bootAudio = vjBootParams.get('audio');
    const bootInfinitestreams = vjBootParams.get('infinitestreams');
    const bootInfinitestreamsOpacity = Number(vjBootParams.get('infinitestreamsopacity'));
    const bootInfinitestreamsUrl = vjBootParams.get('infinitestreamsurl');
    applyVjCommand({
        mode: bootMode || undefined,
        speed: Number.isFinite(bootSpeed) ? bootSpeed : undefined,
        hue: Number.isFinite(bootHue) ? bootHue : undefined,
        intensity: Number.isFinite(bootIntensity) ? bootIntensity : undefined,
        paused: bootPaused === null ? undefined : (bootPaused === 'true' || bootPaused === '1'),
        audio: bootAudio === null ? undefined : (bootAudio === 'true' || bootAudio === '1'),
        infinitestreams: bootInfinitestreams === null ? undefined : (bootInfinitestreams === 'true' || bootInfinitestreams === '1'),
        infinitestreamsOpacity: Number.isFinite(bootInfinitestreamsOpacity) ? bootInfinitestreamsOpacity : undefined,
        infinitestreamsUrl: bootInfinitestreamsUrl || undefined
    });
    function loadBootSetWhenReady(manifestPath, attempt = 0) {
        if (!manifestPath) return;
        if (typeof window.loadVideoSetManifest === 'function') {
            window.loadVideoSetManifest(manifestPath).then(() => {
                if (demoMode) {
                    setBasicVideoMode(true);
                }
            }).catch((error) => {
                console.warn(error);
            });
            return;
        }
        if (attempt < 80) {
            setTimeout(function() {
                loadBootSetWhenReady(manifestPath, attempt + 1);
            }, 125);
        }
    }
    loadBootSetWhenReady(bootSetManifest);
    announceVjReady();
    initVjWebSocket();
    initVjRemotePolling(vjBootParams);
