        function startSceneExportRecording() {
            if (sceneRecorder && sceneRecorder.state === 'recording') {
                return false;
            }
            if (!renderer || !renderer.domElement || !renderer.domElement.captureStream) {
                console.error('Capture stream is not available in this browser.');
                return false;
            }
            sceneRecorderChunks = [];
            const captureStream = renderer.domElement.captureStream(30);
            const candidates = [
                'video/webm;codecs=vp9',
                'video/webm;codecs=vp8',
                'video/webm'
            ];
            sceneRecorderMimeType = '';
            for (const candidate of candidates) {
                if (window.MediaRecorder && MediaRecorder.isTypeSupported(candidate)) {
                    sceneRecorderMimeType = candidate;
                    break;
                }
            }
            sceneRecorder = sceneRecorderMimeType
                ? new MediaRecorder(captureStream, { mimeType: sceneRecorderMimeType })
                : new MediaRecorder(captureStream);
            sceneRecorder.ondataavailable = function(event) {
                if (event.data && event.data.size > 0) {
                    sceneRecorderChunks.push(event.data);
                }
            };
            sceneRecorder.start(250);
            console.log('Scene export recording started');
            return true;
        }

        function stopSceneExportRecording(filename = 'hypermuse-export.webm') {
            if (!sceneRecorder || sceneRecorder.state !== 'recording') {
                return Promise.resolve(false);
            }
            return new Promise(function(resolve) {
                sceneRecorder.onstop = function() {
                    const blobType = sceneRecorderMimeType || 'video/webm';
                    const blob = new Blob(sceneRecorderChunks, { type: blobType });
                    const url = URL.createObjectURL(blob);
                    const anchor = document.createElement('a');
                    anchor.href = url;
                    anchor.download = filename;
                    document.body.appendChild(anchor);
                    anchor.click();
                    document.body.removeChild(anchor);
                    URL.revokeObjectURL(url);
                    sceneRecorder = null;
                    sceneRecorderChunks = [];
                    resolve(true);
                };
                sceneRecorder.stop();
            });
        }

        window.startSceneExportRecording = startSceneExportRecording;
        window.stopSceneExportRecording = stopSceneExportRecording;

                // Now calculate the ratio between each band in a logarithmic scale
        let ratio = Math.pow(maxFrequency / baseFrequency, 1.0 / (numBands - 1));

        function updateLaneShellOpacity(nowMs = performance.now()) {
            if (!laneBaseSpheres || laneBaseSpheres.length === 0) {
                return;
            }
            const classicRecentlyActive = (nowMs - lastClassicPolygonMs) < 1400;
            let targetOpacity = 0.018;
            if (activeEffectProfile === 'classic') {
                targetOpacity = classicRecentlyActive ? 0.14 : 0.04;
            } else if (activeEffectProfile === 'stacked') {
                targetOpacity = 0.026;
            }
            for (let i = 0; i < laneBaseSpheres.length; i++) {
                const material = laneBaseSpheres[i].material;
                if (!material) {
                    continue;
                }
                material.opacity += (targetOpacity - material.opacity) * 0.08;
            }
        }

        function initMoleculeOverlay() {
            moleculeRenderGroup = new THREE.Group();

        function getElementColor(symbol) {
            const key = String(symbol || '').trim().toUpperCase();
            if (key === 'H') return 0xf1fff7;
            if (key === 'O') return 0x9cf7ff;
            if (key === 'N') return 0x87b7ff;
            if (key === 'S') return 0xffeb8a;
            if (key === 'P') return 0xffb97f;
            return 0xbfffd8; // Carbon/default
        }

        function rebuildMoleculeBaseLayout(renderData) {
            const local = [];
            const atomCount = renderData.atoms.length;
            for (let i = 0; i < atomCount; i++) {
                const atom = renderData.atoms[i];
                const u = Number.isFinite(atom.baseU) ? atom.baseU : atom.u;
                const v = Number.isFinite(atom.baseV) ? atom.baseV : atom.v;
                const x = (u - 0.5) * 1.1;
                const y = (0.5 - v) * 1.1;
                const z = (Math.sin((i * 1.27) + 0.8) * 0.12);
                local.push(new THREE.Vector3(x, y, z));
            }
            const center = new THREE.Vector3();
            for (let i = 0; i < local.length; i++) {
                center.add(local[i]);
            }
            center.divideScalar(Math.max(1, local.length));
            for (let i = 0; i < local.length; i++) {
                local[i].sub(center).multiplyScalar(0.58);
            }
            moleculeBaseAtomPositions = local;
            moleculeLastAtomCount = atomCount;
        }

        function ensureMoleculeAtomMeshes(perMoleculeAtomCount, clusterCount) {
            const targetCount = Math.max(0, perMoleculeAtomCount * clusterCount);
            while (moleculeAtomMeshes.length < targetCount) {
                const mesh = new THREE.Mesh(moleculeAtomGeometry, moleculeAtomMaterial.clone());
                mesh.visible = false;
                moleculeRenderGroup.add(mesh);
                moleculeAtomMeshes.push(mesh);
            }
            for (let i = 0; i < moleculeAtomMeshes.length; i++) {
                moleculeAtomMeshes[i].visible = i < targetCount;
            }
        }

        function updateMoleculeOverlay(audioFrame) {
            if (!moleculeRenderGroup || !moleculeSimulationPlugin || !moleculeSimulationPlugin.getRenderData) {
                return;
            }
            const visible = activeEffectProfile === 'molecule' || activeEffectProfile === 'stacked';
            moleculeRenderGroup.visible = visible;
            if (!visible) {
                return;
            }

            const renderData = moleculeSimulationPlugin.getRenderData();
            if (!renderData || !Array.isArray(renderData.atoms) || renderData.atoms.length === 0) {
                return;
            }

            const atomCount = renderData.atoms.length;
            if (moleculeLastAtomCount !== atomCount || moleculeBaseAtomPositions.length !== atomCount) {
                rebuildMoleculeBaseLayout(renderData);
            }

            const clusterCount = activeEffectProfile === 'molecule' ? MOLECULE_CLUSTER_COUNT : Math.max(3, MOLECULE_CLUSTER_COUNT - 2);
            ensureMoleculeAtomMeshes(atomCount, clusterCount);

            const activeSignals = new Array(atomCount).fill(0);
            const low = audioFrame ? (audioFrame.low || 0) : 0;
            const mid = audioFrame ? (audioFrame.mid || 0) : 0;
            const high = audioFrame ? (audioFrame.high || 0) : 0;
            const beatBoost = audioFrame && audioFrame.beat ? 0.14 : 0;
            let totalSignal = 0;

            for (let i = 0; i < atomCount; i++) {
                const atom = renderData.atoms[i];
                const signal = Math.max(0, atom.signal || 0);
                activeSignals[i] = signal;
                totalSignal += signal;
            }
            const meanSignal = totalSignal / Math.max(1, atomCount);

            const now = performance.now();
            const ringRadius = (activeEffectProfile === 'molecule' ? 0.58 : 0.46) + (low * 0.08);
            const moleculeScale = 0.95 + (mid * 0.22) + beatBoost;
            const clusterCenters = [];
            const atomWorldPositions = Array.from({ length: clusterCount }, () => new Array(atomCount));

            for (let clusterIndex = 0; clusterIndex < clusterCount; clusterIndex++) {
                const phase = (now * 0.00034) + ((clusterIndex / clusterCount) * Math.PI * 2);
                const sampledSignal = activeSignals[clusterIndex % atomCount] || meanSignal;
                const localRadius = ringRadius + (sampledSignal * 0.11);
                const center = new THREE.Vector3(
                    Math.cos(phase) * localRadius,
                    (Math.sin((phase * 1.2) + 0.4) * 0.15) + (sampledSignal * 0.08),
                    Math.sin(phase) * 0.22
                );
                clusterCenters.push(center);

                const rotation = phase + (sampledSignal * 0.7);
                const cosR = Math.cos(rotation);
                const sinR = Math.sin(rotation);
                for (let atomIndex = 0; atomIndex < atomCount; atomIndex++) {
                    const meshIndex = (clusterIndex * atomCount) + atomIndex;
                    const mesh = moleculeAtomMeshes[meshIndex];
                    if (!mesh) continue;
                    const base = moleculeBaseAtomPositions[atomIndex] || new THREE.Vector3();
                    const rotatedX = (base.x * cosR) - (base.y * sinR);
                    const rotatedY = (base.x * sinR) + (base.y * cosR);
                    const rotatedZ = base.z;
                    const targetPos = new THREE.Vector3(
                        center.x + (rotatedX * moleculeScale),
                        center.y + (rotatedY * moleculeScale),
                        center.z + (rotatedZ * moleculeScale)
                    );
                    mesh.position.lerp(targetPos, 0.45);
                    atomWorldPositions[clusterIndex][atomIndex] = mesh.position.clone();
                    const atomSignal = activeSignals[atomIndex] || 0;
                    const atomSize = 0.07 + (atomSignal * 0.1) + beatBoost;
                    mesh.scale.set(atomSize, atomSize, atomSize);
                    mesh.material.opacity = Math.min(1, 0.5 + (atomSignal * 0.42) + beatBoost);
                    mesh.material.color.setHex(getElementColor(renderData.atoms[atomIndex].symbol));
                }
            }

            const bondPositions = [];
            if (Array.isArray(renderData.bonds)) {
                for (let clusterIndex = 0; clusterIndex < clusterCount; clusterIndex++) {
                    const clusterAtoms = atomWorldPositions[clusterIndex];
                    for (let i = 0; i < renderData.bonds.length; i++) {
                        const bond = renderData.bonds[i];
                        const signal = Math.max(activeSignals[bond.a] || 0, activeSignals[bond.b] || 0);
                        if (signal < 0.02 || !clusterAtoms[bond.a] || !clusterAtoms[bond.b]) {
                            continue;
                        }
                        bondPositions.push(
                            clusterAtoms[bond.a].x, clusterAtoms[bond.a].y, clusterAtoms[bond.a].z,
                            clusterAtoms[bond.b].x, clusterAtoms[bond.b].y, clusterAtoms[bond.b].z
                        );
                    }
                }
            }

            moleculeBondLines.geometry.setAttribute(
                'position',
                new THREE.Float32BufferAttribute(bondPositions, 3)
            );
            moleculeBondLines.geometry.computeBoundingSphere();

            const interBondPositions = [];
            for (let i = 0; i < clusterCenters.length; i++) {
                const current = clusterCenters[i];
                const next = clusterCenters[(i + 1) % clusterCenters.length];
                interBondPositions.push(
                    current.x, current.y, current.z,
                    next.x, next.y, next.z
                );
            }
            moleculeInterBondLines.geometry.setAttribute(
                'position',
                new THREE.Float32BufferAttribute(interBondPositions, 3)
            );
            moleculeInterBondLines.geometry.computeBoundingSphere();

            moleculeBondMaterial.opacity = Math.min(1, 0.38 + (meanSignal * 0.45) + (low * 0.2) + beatBoost);
            moleculeInterBondMaterial.opacity = Math.min(0.85, 0.24 + (mid * 0.45) + (beatBoost * 0.7));
            moleculeRenderGroup.rotation.z += 0.0012 + (high * 0.01);
            moleculeRenderGroup.rotation.y = Math.sin((performance.now() / 1200)) * 0.12;
        }

                    ? String(window.__hypermuseCurrentLoopLabel).trim()

                if (currentLoopLabel) {
                    details += ` | Loop: ${currentLoopLabel}`;
                }

            if ((activeEffectProfile === 'molecule' || activeEffectProfile === 'stacked') && moleculeSimulationPlugin && moleculeSimulationPlugin.getSummary) {
                const summary = moleculeSimulationPlugin.getSummary();
                if (summary && summary.label) {
                    details += ` | Molecule: ${summary.label}`;
                }
            }
            effectOverlayElement.textContent = details;
        }

        function initSimulationLayers() {
            layeredAudioEngine = new HypermuseAudioEngine({ numBands: numBands });
            simCompositor = new HypermuseSimulationCompositor({ width: 128, height: 128 });
            const lifePlugin = new HypermuseLifeSimulationPlugin("life-primary");
            simCompositor.registerPlugin(lifePlugin, {
                opacity: 0.85,
                color: [70, 180, 255]

        function updateSimulationStage() {
            if (!simulationShell) {
                return;
            }
            const isClassic = activeEffectProfile === 'classic';
            const isLife = activeEffectProfile === 'life';
            const isKuramoto = activeEffectProfile === 'kuramoto';
            const isMolecule = activeEffectProfile === 'molecule';
            const isStacked = activeEffectProfile === 'stacked';

            simulationShell.visible = isClassic;
            if (lifeSideSphere) {
                lifeSideSphere.visible = concurrentSideEffects ? !isClassic : (isLife || isStacked);
                lifeSideSphere.material.opacity = isLife ? 0.82 : (isStacked ? 0.7 : 0.34);
            }
            if (kuramotoSideSphere) {
                kuramotoSideSphere.visible = concurrentSideEffects ? !isClassic : (isKuramoto || isStacked);
                kuramotoSideSphere.material.opacity = isKuramoto ? 0.86 : (isStacked ? 0.72 : 0.36);
            }
            if (moleculeSideSphere) {
                moleculeSideSphere.visible = concurrentSideEffects
                    ? (!isClassic && !isMolecule)
                    : isStacked;
                moleculeSideSphere.material.opacity = isStacked ? 0.62 : 0.28;
            }

            if (moleculeRenderGroup) {
                if (isMolecule) {
                    moleculeRenderGroup.position.set(MOLECULE_SIDE_SPHERE_X, MOLECULE_SIDE_SPHERE_Y, SIDE_SPHERE_Z + 0.16);
                    moleculeRenderGroup.scale.set(0.65, 0.65, 0.65);

                    moleculeRenderGroup.scale.set(0.52, 0.52, 0.52);

        function parsePhaseList(phaseListText, defaultDurationSec) {
            const raw = String(phaseListText || '')
                .split(',')
                .map(value => value.trim())
                .filter(Boolean);
            const seen = new Set();
            const plan = [];
            for (const phase of raw) {
                if (seen.has(phase)) {
                    continue;
                }
                seen.add(phase);
                plan.push({
                    name: phase,
                    durationSec: Math.max(1, defaultDurationSec)
                });
            }
            return plan;
        }

        function setEffectTimelineConfig(config = {}, restart = true) {
            if (typeof config.enabled === 'boolean') {
                effectTimelineEnabled = config.enabled;
            }

            if (Array.isArray(config.phases) && config.phases.length > 0) {
                const nextPlan = [];
                for (const phaseEntry of config.phases) {
                    if (typeof phaseEntry === 'string') {
                        nextPlan.push({ name: phaseEntry, durationSec: 16 });
                        continue;
                    }
                    if (!phaseEntry || !phaseEntry.name) {
                        continue;
                    }
                    const durationSec = Number.isFinite(phaseEntry.durationSec)
                        ? Math.max(1, phaseEntry.durationSec)
                        : 16;
                    nextPlan.push({
                        name: String(phaseEntry.name),
                        durationSec
                    });
                }
                if (nextPlan.length > 0) {
                    effectTimelinePlan = nextPlan;
                }
            } else if (typeof config.phaseList === 'string') {
                const defaultDurationSec = Number.isFinite(config.phaseDurationSec)
                    ? Math.max(1, config.phaseDurationSec)
                    : 16;
                const parsed = parsePhaseList(config.phaseList, defaultDurationSec);
                if (parsed.length > 0) {
                    effectTimelinePlan = parsed;
                }
            }

            if (restart) {
                effectTimelineStartMs = performance.now();
                lastAppliedEffectPhase = '';
            }
            updateEffectTimelineControls();
        }

        function updateEffectTimelineControls() {
            const enabledInput = document.getElementById('effectTimelineEnabled');
            const phasesInput = document.getElementById('effectTimelinePhases');
            const secInput = document.getElementById('effectTimelinePhaseSec');

            if (enabledInput) {
                enabledInput.checked = effectTimelineEnabled;
            }
            if (phasesInput) {
                phasesInput.value = effectTimelinePlan.map(entry => entry.name).join(',');
            }
            if (secInput) {
                const firstDuration = effectTimelinePlan.length > 0
                    ? effectTimelinePlan[0].durationSec
                    : 16;
                secInput.value = String(firstDuration);
            }
        }

        window.setEffectTimelineConfig = setEffectTimelineConfig;

        function applyTimedEffects() {
            if (!effectTimelineEnabled || effectTimelineStartMs === null || effectTimelinePlan.length === 0) {
                return;
            }

            const elapsedSec = (performance.now() - effectTimelineStartMs) / 1000;
            let cycleSec = 0;
            for (const entry of effectTimelinePlan) {
                cycleSec += Math.max(1, entry.durationSec);
            }
            const t = elapsedSec % cycleSec;
            let cursor = 0;
            let phase = effectTimelinePlan[0].name;
            for (const entry of effectTimelinePlan) {
                const d = Math.max(1, entry.durationSec);
                if (t >= cursor && t < cursor + d) {
                    phase = entry.name;
                    break;
                }
                cursor += d;
            }

            if (phase !== lastAppliedEffectPhase) {
                applyEffectProfile(phase);
                lastAppliedEffectPhase = phase;
                if (moleculeCycleOnPhaseChange && moleculeSequence.length > 0) {
                    advanceMoleculeSequence().catch((error) => console.error(error));
                }
            }
        }

        function getLaneKeyForBandIndex(bandIndex) {
            if (bandIndex >= midBandCutoff) {
                return 'high';

            if (bandIndex >= lowBandCutoff) {
                return 'mid';

            return 'low';

        // Build three lane spheres in spatial order:
        // left = HIGH, middle = MID, right = LOW.
        function initBands(){
            lowBandCutoff = Math.max(1, Math.floor(numBands / 3));
            midBandCutoff = Math.max(lowBandCutoff + 1, Math.floor((numBands * 2) / 3));
            midBandCutoff = Math.min(numBands - 1, midBandCutoff);
            bandPoints = new Array(numBands);
            laneLastPoints.high = [];
            laneLastPoints.mid = [];
            laneLastPoints.low = [];

            for (const sphere of laneBaseSpheres) {
                scene.remove(sphere);
                if (sphere.geometry) sphere.geometry.dispose();
                if (sphere.material) sphere.material.dispose();
            }
            laneBaseSpheres = [];

            function buildLanePoints(indices, centerX) {
                const goldenRatio = (1 + Math.sqrt(5)) / 2;
                const angleIncrement = Math.PI * 2 * goldenRatio;
                const count = Math.max(1, indices.length);
                for (let localIndex = 0; localIndex < indices.length; localIndex++) {
                    const bandIndex = indices[localIndex];
                    const v = localIndex / count;
                    const phi = v * Math.PI;
                    const theta = angleIncrement * localIndex;
                    const x = centerX + (LANE_RADIUS * Math.sin(phi) * Math.cos(theta));
                    const y = LANE_RADIUS * Math.sin(phi) * Math.sin(theta);
                    const z = LANE_RADIUS * Math.cos(phi);

                    const point = new THREE.Points(
                        new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0, 0, 0)]),
                        new THREE.PointsMaterial({ color: 0xffffff, size: 0.01 })
                    );
                    point.position.set(
                        isNaN(x) ? centerX : x,
                        isNaN(y) ? 0 : y,
                        isNaN(z) ? 0 : z
                    );
                    bandPoints[bandIndex] = point;
                }
            }

            const lowIndices = [];
            const midIndices = [];
            const highIndices = [];
            for (let i = 0; i < numBands; i++) {
                const laneKey = getLaneKeyForBandIndex(i);
                if (laneKey === 'high') {
                    highIndices.push(i);
                } else if (laneKey === 'mid') {
                    midIndices.push(i);
                } else {
                    lowIndices.push(i);
                }
            }

            buildLanePoints(highIndices, HIGH_LANE_CENTER_X);
            buildLanePoints(midIndices, MID_LANE_CENTER_X);
            buildLanePoints(lowIndices, LOW_LANE_CENTER_X);

            const highShell = new THREE.Mesh(
                new THREE.SphereGeometry(LANE_RADIUS * 1.02, 22, 22),
                new THREE.MeshBasicMaterial({
                    color: 0x9affcc,
                    wireframe: true,
                    transparent: true,
                    opacity: 0.12
                })
            );
            highShell.position.set(HIGH_LANE_CENTER_X, 0, 0);

            const midShell = new THREE.Mesh(
                new THREE.SphereGeometry(LANE_RADIUS * 1.02, 22, 22),
                new THREE.MeshBasicMaterial({
                    color: 0xb8ffe0,
                    wireframe: true,
                    transparent: true,
                    opacity: 0.11
                })
            );
            midShell.position.set(MID_LANE_CENTER_X, 0, 0);

            const lowShell = new THREE.Mesh(
                new THREE.SphereGeometry(LANE_RADIUS * 1.02, 22, 22),
                new THREE.MeshBasicMaterial({
                    color: 0x86f7b7,
                    wireframe: true,
                    transparent: true,
                    opacity: 0.12
                })
            );
            lowShell.position.set(LOW_LANE_CENTER_X, 0, 0);

            laneBaseSpheres.push(highShell, midShell, lowShell);
            scene.add(highShell);
            scene.add(midShell);
            scene.add(lowShell);
        }

        function captureAudioData() {


            let data = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteFrequencyData(data);
            const nowMs = performance.now();
            let totalEnergy = 0;
            for (let i = 0; i < data.length; i++) {
                totalEnergy += data[i];
            }
            const inWarmup = nowMs < visualWarmupUntilMs;

            // Startup fallback so first seconds are visibly active before decoded audio bins ramp up.
            if (inWarmup && totalEnergy < 64) {
                for (let i = 0; i < data.length; i++) {
                    const osc1 = Math.sin((i * 0.085) + (nowMs / 240));
                    const osc2 = Math.sin((i * 0.018) + (nowMs / 510));
                    const v = 58 + (osc1 * 52) + (osc2 * 34);
                    data[i] = Math.max(0, Math.min(255, Math.floor(v)));
                }
            }
            if (layeredAudioEngine) {
                layeredAudioEngine.setNumBands(numBands);
                const now = performance.now();
                const dt = Math.max(0.001, (now - lastSimulationTickMs) / 1000);
                lastSimulationTickMs = now;
                const audioFrame = layeredAudioEngine.update(data, audioContext);
                if (simCompositor) {
                    simCompositor.update(dt, audioFrame);
                }
                updateMoleculeOverlay(audioFrame);
                if (simulationShell) {
                    simulationShell.material.opacity = Math.min(0.95, simulationShellBaseOpacity + (audioFrame.energy * 0.85));
                    simulationShell.rotation.y += 0.0015 + (audioFrame.mid * 0.01);
                    simulationShell.rotation.x += 0.0008 + (audioFrame.high * 0.004);
                }
                if (lifeSideSphere && lifeSideSphere.visible) {
                    lifeSideSphere.rotation.y += 0.001 + (audioFrame.low * 0.01);
                    lifeSideSphere.rotation.x += 0.0006 + (audioFrame.mid * 0.004);
                }
                if (kuramotoSideSphere && kuramotoSideSphere.visible) {
                    kuramotoSideSphere.rotation.y += 0.0018 + (audioFrame.mid * 0.016);
                    kuramotoSideSphere.rotation.z += 0.0007 + (audioFrame.high * 0.006);
                }
                if (moleculeSideSphere && moleculeSideSphere.visible) {
                    moleculeSideSphere.rotation.y += 0.0012 + (audioFrame.high * 0.01);
                    moleculeSideSphere.rotation.x += 0.0005 + (audioFrame.low * 0.004);
                }
                // Keep side effects live simultaneously while preserving phase emphasis.
                updateSimulationStage();
            }

            let bandSize = Math.floor(data.length / numBands);

            clearNoteSpheres();

            let bandWidth = audioContext.sampleRate / analyser.frequencyBinCount; // Adjust as necessary based on how you set up the Web Audio API.
           
            // console.log(bandWidth);

            let peakVolume = 0;
            let peakBand = null;
            // console.log(numBands);
            for (let i = 0; i < numBands; i++) {
                // console.log("i");

                let band = data.slice(i * bandSize, (i + 1) * bandSize);
                let volume = getAverageVolume(band);
                
                if (volume > peakVolume) {
                    peakVolume = volume;
                    peakBand = band;
                    peakBandIndex = i;  // Store the index of the peak band
                    // console.log("peakBandIndex" + peakBandIndex);

                }
            }
            // console.log("Peak band index:", peakBandIndex);
            // console.log("Peak volume:", peakVolume);


            if (peakBand && false) {

                analyser.getFloatTimeDomainData( buf );
                var ac = autoCorrelate( buf, audioContext.sampleRate );
                pitch = ac;
                var note =  noteFromPitch( pitch );
                // // console.log(note);
                // // var otherNote = detectNoteFromBand(peakBand, bandWidth);
                // // console.log("Detected note for peak band:", note);

                if (note && noteDisplayEnabled) {
                    console.log("Peak note detected");
                    console.log(peakBandIndex);
                    let noteText = noteStrings[note%12];
                    console.log(noteText);
                    let noteSphere = createNoteSphere(noteText);
                    if (bandPoints[peakBandIndex]) {
                        noteSphere.position.copy(bandPoints[peakBandIndex].position);
                    }
                    noteSphere.userData.type = 'noteSphere';  // Tagging the sphere so that we can easily remove it later
                    noteSphere.scale.set(0.1, 0.1, 0.1);  // Scale down the sphere to make it smaller
                    noteSphere.rotation.y = -Math.PI / 2;
                    scene.add(noteSphere);
                    // console.log("Added peak note sphere:", noteSphere);
                }
            }



            for (let i = 0; i < numBands; i++) {
                // TODO: this doesn't seem to be properly using the band frequency

                let band = data.slice(i * bandSize, (i + 1) * bandSize);
                let volume = getAverageVolume(band);
                let volumeDisplay = document.getElementById('volume' + i);
                volumeDisplay.textContent = ' ' + volume.toFixed(2) + ' / ' + thresholds[i];


                const warmupThresholdFactor = inWarmup ? 0.52 : 1.0;
                if (volume >= (thresholds[i] * warmupThresholdFactor * effectActivationFactor)) {


                    let color;
                    if (activeEffectProfile === 'kuramoto') {
                        const laneKeyForColor = getLaneKeyForBandIndex(i);
                        const laneBaseHue = laneKeyForColor === 'high' ? 292 : (laneKeyForColor === 'mid' ? 196 : 126);
                        const hueDrift = ((nowMs * 0.03) + (i * 5.5) + (volume * 0.42)) % 360;
                        const hue = (laneBaseHue + (hueDrift * 0.35)) % 360;
                        const lightness = Math.min(78, 50 + (volume * 0.16));
                        color = new THREE.Color('hsl(' + hue + ', 98%, ' + lightness + '%)');
                    } else {
                        let hue = (volume * volumemagnification) + hueoffset;
                        if (hue > 360) hue -= 360;
                        color = new THREE.Color('hsl(' + hue + ', ' + saturation + '%, ' + brightness  + '%)');
                    }
                   
                    // console.log(band);


                    // let detectedNote = detectNote(band);  // Implement detectNote() based on your frequency to note logic
                    // if (detectedNote) {

                    // }

                    if (bandPoints[i]) bandPoints[i].material.color = color;

                    volumeDisplay.style.color = '#00ff00'; // green
                    const laneKey = getLaneKeyForBandIndex(i);
                    const currentLaneLastPoints = laneLastPoints[laneKey];
                    if (currentLaneLastPoints.length >= 3) {


                        var geometry = createTriangleGeometry(currentLaneLastPoints[0], currentLaneLastPoints[1], currentLaneLastPoints[2]);
                        var material; 
                        if(videoElementActive) {
                             var texture = getVideoFrameTexture();
                             let opacitylevel=1;
                             if (videoFullOpacity)
                                opacitylevel = 1;
                            else
                               opacitylevel =  (12 / volume ) + .2;
                             // TODO: hits infinity too often
                            //  console.log(opacitylevel);
                             material = new THREE.MeshBasicMaterial({map:texture, opacity: opacitylevel, transparent: true, side: THREE.DoubleSide});
                             material.needsUpdate = true;
                        }
                        else if (imageElementActive) {

                            var texture = getNextImageTexture();
                             material = new THREE.MeshBasicMaterial({map:texture, opacity: 0.6, transparent: true, side: THREE.DoubleSide});
                             material.needsUpdate = true;

                        } else  {

                            material = new THREE.MeshBasicMaterial({color: color, opacity: 0.6, transparent: true, side: THREE.DoubleSide});

                        }

                        let createdGeometry = null;
                        let createdObject = null;

                        if (activeEffectProfile === 'kuramoto') {
                            const lineGeometry = new THREE.BufferGeometry().setFromPoints([
                                currentLaneLastPoints[0], currentLaneLastPoints[1], currentLaneLastPoints[2], currentLaneLastPoints[0]
                            ]);
                            const lineMaterial = new THREE.LineBasicMaterial({
                                color: color,
                                opacity: 0.95,
                                transparent: true
                            });
                            createdGeometry = lineGeometry;
                            createdObject = new THREE.Line(lineGeometry, lineMaterial);
                        } else {
                            if (activeEffectProfile === 'molecule' && simCompositor && simCompositor.texture) {
                                material = new THREE.MeshBasicMaterial({
                                    map: simCompositor.texture,
                                    color: color,
                                    opacity: 0.78,
                                    transparent: true,
                                    side: THREE.DoubleSide
                                });
                                const centroid = new THREE.Vector3()
                                    .add(currentLaneLastPoints[0])
                                    .add(currentLaneLastPoints[1])
                                    .add(currentLaneLastPoints[2])
                                    .divideScalar(3);
                                const bubbleRadius = 0.08 + (volume / 420);
                                const bubbleGeometry = new THREE.SphereGeometry(bubbleRadius, 14, 14);
                                const bubble = new THREE.Mesh(bubbleGeometry, material);
                                bubble.position.copy(centroid);
                                bubble.position.x += (Math.random() - 0.5) * 0.06;
                                bubble.position.y += (Math.random() - 0.5) * 0.06;
                                bubble.position.z += (Math.random() - 0.5) * 0.06;
                                bubble.castShadow = true;
                                bubble.receiveShadow = true;
                                createdGeometry = bubbleGeometry;
                                createdObject = bubble;
                            } else if (activeEffectProfile === 'classic') {
                                const triangle = new THREE.Mesh(geometry, material);
                                triangle.castShadow = true;
                                triangle.receiveShadow = true;
                                createdGeometry = geometry;
                                createdObject = triangle;
                                lastClassicPolygonMs = performance.now();
                            }
                        }

                        if (createdObject) {
                            scene.add(createdObject);
                        }
                        if (innerTriangleActive && activeEffectProfile === 'classic' && createdObject)
                        {
                            var innerGeometry = createInnerTriangleGeometry(currentLaneLastPoints[0], currentLaneLastPoints[1], currentLaneLastPoints[2]);
                            var innerMaterial = new THREE.MeshBasicMaterial({color: "black", opacity: 0.5, transparent: false, side: THREE.DoubleSide});
                            var innerTriangle = new THREE.Mesh(innerGeometry, innerMaterial);
                            scene.add(innerTriangle); 

                        }

                        if (geometries.length > ACTIVE_GEOMETRIES_LIMIT) {

                                geometries[0].geometry.geometry.dispose();
                                geometries[0].geometry.material.dispose();
                                scene.remove(geometries[0].geometry);
                                geometries.shift();

                        }

                        if (createdObject) {
                            geometries.push({geometry: createdObject, age: 0});
                        }
                        if (innerTriangleActive && activeEffectProfile === 'classic' && createdObject)
                        {
                            geometries.push({geometry: innerTriangle, age: 0});

                        }

                        currentLaneLastPoints.shift();
                    }

                    if (bandPoints[i]) {
                        currentLaneLastPoints.push(bandPoints[i].position.clone());
                    }
                } else {
                    volumeDisplay.style.color = '#ff0000'; // red
                }
            }

            for (let i = geometries.length - 1; i >= 0; i--) {
                geometries[i].age++;
                if (geometries[i].age > 20) {
                    geometries[i].geometry.material.opacity -= 0.01;
                    if (geometries[i].geometry.material.opacity <= 0) {
                        scene.remove(geometries[i].geometry);
                        geometries.splice(i, 1);
                    }
                }
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            applyTimedEffects();

            // untoggle if to make fully deterministic
            hueoffset += hueOffsetSpeed;

            if(hueoffset > 360) {
                hueoffset -= 360;
            }



            scene.rotation.x += X_ROTATION_SPEED; 
            scene.rotation.y += Y_ROTATION_SPEED;
            updateLaneShellOpacity();

            renderer.render(scene, camera);
            updateEffectOverlay();
        }

        function startAnimationLoop() {
            if (!animationStarted) {
                animationStarted = true;
                animate();
            }
        }

        function ensureVisualizerLoopsRunning() {
            startAnimationLoop();
            if (effectTimelineStartMs === null) {
                effectTimelineStartMs = performance.now();
            }
            visualWarmupUntilMs = performance.now() + 8000;
            if (!analyser || !audioContext) {
                return;
            }
            if (captureInterval) {
                clearInterval(captureInterval);
            }
            captureInterval = setInterval(captureAudioData, CAPTURE_INTERVAL_MS);
        }

        let previousEnergies = []; // To store recent energy values
        let ENERGY_HISTORY = 10;  // How many past energy values to store
        let BEAT_THRESHOLD = 1.05; // To be adjusted
        let beatDataArray;
        let bufferLength;

        let audioContext;
        let biquadFilter;
        let startButton = document.getElementById('startButton');
        startButton.addEventListener('click', function() {
            startButton.parentElement.removeChild(startButton);

            navigator.mediaDevices.getUserMedia({ video: false, audio: true}).then(function(stream) {

            //NOTE: this helped with some pitch detection but had side effects

            // navigator.mediaDevices.getUserMedia({ video: false, audio: {
            // "mandatory": {
            //     "googEchoCancellation": "false",
            //     "googAutoGainControl": "false",
            //     "googNoiseSuppression": "false",
            //     "googHighpassFilter": "false"
            // }}}).then(function(stream) {
                
                audioContext = new AudioContext();
                let source = audioContext.createMediaStreamSource(stream);
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 2048 * 2;
                source.connect(analyser);

                //NOTE: not sure this is adding much value

                biquadFilter = audioContext.createBiquadFilter();
                biquadFilter.type = "lowpass";
                biquadFilter.frequency.setValueAtTime(150, audioContext.currentTime); // Keeping frequencies below 150Hz
                source.connect(biquadFilter);
                biquadFilter.connect(analyser);
                
                bufferLength = analyser.frequencyBinCount;
                beatDataArray = new Uint8Array(bufferLength);
                ensureVisualizerLoopsRunning();
                MAX_SIZE = Math.max(4,Math.floor(audioContext.sampleRate/5000));	// corresponds to a 5kHz signal
                // startPitchDetect();
                // updatePitch();

            });
        });

        
        let masterInput = document.getElementById('master');
        masterInput.value = startingVolumeThreshold;

        let thresholdsDiv = document.getElementById('thresholds');
        let startingVolumeThresholds = new Array(numBands).fill(startingVolumeThreshold);

        for(let i = 0; i < numBands; i++){
            let highEnd = 200; // maximum volume threshold for lowest frequency band
            let lowEnd = 10;   // minimum volume threshold for highest frequency band
            let range = highEnd - lowEnd;

            let input = document.createElement('input');
            input.type = 'range';
            input.min = '0';
            input.max = '255';
            input.value = startingVolumeThreshold;
            startingVolumeThresholds[i] = startingVolumeThreshold;
            thresholds[i] =  startingVolumeThreshold;

            // input.value = highEnd - Math.floor((i/numBands) * range);
            // startingVolumeThresholds[i] = highEnd - Math.floor((i/numBands) * range);
            input.id = 'threshold' + i;
            input.oninput = function(){
                thresholds[i] = this.value;  // Set the threshold for specific band
                // Add this line to update the display text when the threshold changesf
                // document.getElementById('volume' + i).textContent = 'v: ' + startingVolumeThresholds[i] + ' 0 / ' + startingVolumeThresholds[i];
                document.getElementById('volume' + i).textContent = ' 0 / ' + thresholds[i];

            };

            let volumeDisplay = document.createElement('span');
            volumeDisplay.id = 'volume' + i;
            volumeDisplay.style.color = 'white';
            volumeDisplay.textContent = "v: ";

            thresholdsDiv.appendChild(document.createTextNode('Band ' + i + ': '));
            thresholdsDiv.appendChild(input);
            thresholdsDiv.appendChild(volumeDisplay);
            thresholdsDiv.appendChild(document.createElement('br'));
            document.getElementById('volume' + i).textContent = 'v: 0 / ' + thresholds[i];
            document.getElementById('volume' + i).style = 'color:black';

        }

        let master = document.getElementById('master');
        let lastMasterValue = startingVolumeThreshold;
        master.oninput = function() {
            let masterValue = this.value;
            let delta = masterValue - lastMasterValue;
            // startingVolumeThresholds = startingVolumeThresholds.map(() => masterValue);  // Set all thresholds to the master's value

            for (let i = 0; i < numBands; i++) {
                let input = document.getElementById('threshold' + i);
                thresholds[i] =  parseInt(input.value) + delta;
                input.value = parseInt(input.value) + delta;
                document.getElementById('volume' + i).textContent = 'v: 0 / ' + input.value;
            }

            lastMasterValue = masterValue;
        };

        const audioQueue = [];
        let audioSource;  // Keep track of the current audio source

    document.getElementById('audioInput').addEventListener('change', async function(event) {

        audioContext = new AudioContext();
        if (audioContext.state === 'suspended') {
            await audioContext.resume();
        }
        analyser = audioContext.createAnalyser();
        analyser.fftSize = 2048 * 2 * 2;

        // Populate the audioQueue with the selected files
        audioQueue.length = 0;  // Clear the queue
        for (let file of event.target.files) {
            console.log(file);
            audioQueue.push(file);
        }

        playNext();
        ensureVisualizerLoopsRunning();
        MAX_SIZE = Math.max(4, Math.floor(audioContext.sampleRate / 5000));

    });



    // function playSound(buffer) {
    //     let source = audioContext.createBufferSource(); 
    //     source.buffer = buffer;
    //     source.connect(analyser); // Connect source to the analyser
    //     source.connect(audioContext.destination); // Connect source to the speakers
    //     source.start(0);
    // }

        // for video render

    // const allVideoQueues;s

    function hide() {
        document.getElementById("thresholds").style.display = "none";
    }
